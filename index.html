<head>
<meta charset="UTF-8"/>

<title>VETUR — Gestão de Milhas</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;}
body{background:#060C1E;color:#E8EDF8;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:#1B2A5040;border-radius:2px;}
input:focus,select:focus{outline:none;border-color:#C9A84C88!important;}
select option{background:#0C1525;}
.serif{font-family:'Cormorant Garamond',serif;}
.mono{font-family:'JetBrains Mono',monospace;}

/* Layout */
#app{min-height:100vh;background:#060C1E;}
.header{background:#0C1525;border-bottom:1px solid #1B2A5022;padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-bar{background:#0C1525;border-bottom:1px solid #1B2A5022;padding:0 20px;display:flex;overflow-x:auto;}
.nav-btn{padding:14px 16px;border:none;background:transparent;color:#4E6285;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;}
.nav-btn.active{color:#C9A84C;border-bottom-color:#C9A84C;}
.content{padding:20px;max-width:1280px;margin:0 auto;}
.hidden{display:none!important;}

/* Cards */
.card{background:#0C1525;border:1px solid #1B2A5022;border-radius:16px;padding:20px;}
.card-gold{border-color:#C9A84C22;}
.surface{background:#111E38;border-radius:9px;}

/* Metric cards */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px;}
.metric{background:#0C1525;border:1px solid #1B2A5022;border-radius:16px;padding:20px;}
.metric-label{font-size:10px;font-weight:600;color:#4E6285;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.metric-val{font-size:28px;font-weight:700;line-height:1;}
.metric-sub{font-size:11px;color:#4E6285;margin-top:5px;}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 12px;color:#4E6285;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #1B2A5022;}
td{padding:11px 12px;border-bottom:1px solid #1B2A501A;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#111E3820;}
.tbl-wrap{overflow-x:auto;}

/* Badges */
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;}

/* Buttons */
.btn{padding:8px 16px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:none;}
.btn-gold{background:linear-gradient(135deg,#C9A84C,#A67C2A);color:#060C1E;}
.btn-ghost{background:#111E38;color:#E8EDF8;border:1px solid #1B2A5022!important;}
.btn-danger{background:#ef444415;color:#ef4444;border:1px solid #ef444425!important;}
.btn-sm{padding:4px 10px;border-radius:6px;font-size:11px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}

/* Inputs */
.inp{width:100%;background:#111E38;border:1px solid #1B2A5022;color:#E8EDF8;padding:9px 13px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;}
.inp-gold{background:#111E38;border:1px solid #C9A84C40;color:#C9A84C;padding:10px 14px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;text-align:center;width:100%;}
.flabel{display:block;font-size:10px;font-weight:700;color:#4E6285;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.fgroup{margin-bottom:14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#060C1E;}
.login-card{background:#0C1525;border:1px solid #C9A84C22;border-radius:24px;padding:44px 36px;width:100%;max-width:420px;}
.login-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;gap:10px;}
.login-logo img{height:90px;width:auto;object-fit:contain;}
.login-tagline{font-size:9px;letter-spacing:2.5px;color:#4E6285;text-transform:uppercase;text-align:center;}
.login-btn{width:100%;padding:13px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;background:linear-gradient(135deg,#C9A84C,#A67C2A);color:#060C1E;}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;}
.login-err{background:#ef444415;border:1px solid #ef444430;color:#ef4444;border-radius:10px;padding:10px 14px;font-size:13px;margin-top:12px;text-align:center;}
.login-help{text-align:center;margin-top:20px;font-size:11px;color:#4E6285;}
.pw-wrap{position:relative;}
.pw-eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#4E6285;font-size:14px;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:#00000092;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px);}
.modal-box{background:#0C1525;border:1px solid #C9A84C22;border-radius:20px;padding:26px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;margin-bottom:20px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}

/* IA Chat */
.ia-bg{position:fixed;inset:0;background:#00000090;z-index:300;display:flex;align-items:flex-end;justify-content:flex-end;padding:20px;backdrop-filter:blur(4px);}
.ia-box{background:#0C1525;border:1px solid #C9A84C30;border-radius:20px;width:100%;max-width:420px;height:78vh;display:flex;flex-direction:column;overflow:hidden;}
.ia-header{padding:14px 18px;border-bottom:1px solid #1B2A5022;display:flex;align-items:center;justify-content:space-between;}
.ia-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.ia-msg-user{display:flex;justify-content:flex-end;}
.ia-msg-bot{display:flex;justify-content:flex-start;}
.ia-bubble-user{max-width:85%;padding:9px 13px;border-radius:14px 14px 3px 14px;background:linear-gradient(135deg,#C9A84C,#A67C2A);color:#060C1E;font-size:13px;line-height:1.5;white-space:pre-wrap;}
.ia-bubble-bot{max-width:85%;padding:9px 13px;border-radius:14px 14px 14px 3px;background:#111E38;color:#E8EDF8;border:1px solid #1B2A5022;font-size:13px;line-height:1.5;white-space:pre-wrap;}
.ia-input-row{padding:10px 14px;border-top:1px solid #1B2A5022;display:flex;gap:8px;}
.ia-input{flex:1;background:#111E38;border:1px solid #1B2A5022;color:#E8EDF8;padding:8px 12px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;}
.ia-send{background:linear-gradient(135deg,#C9A84C,#A67C2A);border:none;color:#060C1E;padding:8px 16px;border-radius:9px;cursor:pointer;font-weight:700;font-size:13px;}

/* Bar chart */
.bar-row{margin-bottom:10px;}
.bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;}
.bar-track{background:#111E38;border-radius:4px;height:4px;overflow:hidden;}
.bar-fill{height:4px;border-radius:4px;background:linear-gradient(90deg,#C9A84C,#F0D080);}

/* Programs grid */
.prog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.prog-card{background:#111E38;border:1px solid #1B2A5022;border-radius:11px;padding:13px;}
.prog-name{font-size:11px;font-weight:700;color:#E8EDF8;line-height:1.3;}
.prog-cat{font-size:10px;margin-top:2px;}
.prog-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:#C9A84C;}
.prog-type{font-size:10px;color:#4E6285;margin-top:2px;}

/* Cat filter pills */
.cat-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.cat-pill{padding:4px 12px;border-radius:20px;border:1px solid #1B2A5022;background:transparent;color:#4E6285;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;}
.cat-pill.active{border-color:#C9A84C45;background:#C9A84C18;color:#C9A84C;}

/* Simulador */
.tier-pills{display:flex;gap:6px;flex-wrap:wrap;}
.tier-pill{padding:4px 12px;border-radius:20px;border:1px solid #1B2A5022;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;color:#4E6285;}
.cartao-item{background:#111E38;border:1px solid #1B2A5022;border-radius:11px;padding:10px 12px;margin-bottom:7px;cursor:pointer;}
.cartao-item.selected{background:#C9A84C10;border-color:#C9A84C50;}
.check-circle{width:20px;height:20px;border-radius:50%;border:2px solid #4E6285;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:#060C1E;}
.check-circle.checked{background:#C9A84C;border-color:#C9A84C;}

/* Calc */
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1B2A501A;}
.calc-row:last-child{border-bottom:none;}
.result-box{text-align:center;padding:12px;border-radius:11px;margin-top:12px;font-weight:700;font-size:14px;}

/* Header user pill */
.user-pill{display:flex;align-items:center;gap:7px;background:#111E38;border:1px solid #C9A84C28;border-radius:24px;padding:5px 12px 5px 9px;}
.user-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.user-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;text-transform:uppercase;}

/* Alert row */
.alert-row{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:8px;background:#FAEEDA;margin-bottom:8px;}
.alert-dot{width:8px;height:8px;border-radius:50%;background:#BA7517;margin-top:4px;flex-shrink:0;}
.alert-text{font-size:12px;color:#633806;}

/* Client selector */
.client-sel{display:flex;align-items:center;gap:6px;background:#111E38;border:1px solid #1B2A5022;border-radius:9px;padding:5px 10px;}
.client-sel select{background:transparent;border:none;color:#E8EDF8;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;max-width:150px;}

/* Responsive */
@media(max-width:600px){
  .grid2{grid-template-columns:1fr;}
  .metrics-grid{grid-template-columns:1fr 1fr;}
  .header{flex-wrap:wrap;height:auto;padding:8px 12px;gap:6px;}
}
</style>
</head>

function getRef(prog){
  // Merge MILHEIRO_REF base com overrides do admin salvos no store
  const base = MILHEIRO_REF[prog]||{};
  const ov   = (store.milheiroRefs||{})[prog]||{};
  return {
    excelente: ov.excelente!=null ? Number(ov.excelente) : base.excelente,
    bom:       ov.bom!=null       ? Number(ov.bom)       : base.bom,
    medio:     ov.medio!=null     ? Number(ov.medio)     : base.medio,
    ruim:      ov.ruim!=null      ? Number(ov.ruim)      : base.ruim,
    venda:     ov.venda!=null     ? Number(ov.venda)     : base.venda,
    nota:      ov.nota!=null      ? ov.nota              : base.nota,
  };
}
function getMilheiroStatus(prog, custo){
  const ref = getRef(prog);
  if(!ref.excelente || custo==null || custo<=0) return null;
  if(custo <= ref.excelente) return {label:"Excelente",color:"#10b981",bg:"#10b98118",icon:"🟢"};
  if(custo <= ref.bom)       return {label:"Bom",      color:"#22c55e",bg:"#22c55e18",icon:"🟢"};
  if(custo <= ref.medio)     return {label:"Regular",  color:"#f59e0b",bg:"#f59e0b18",icon:"🟡"};
  if(custo <= ref.ruim)      return {label:"Alto",     color:"#f97316",bg:"#f97316 18",icon:"🟠"};
  return                            {label:"Caro",     color:"#ef4444",bg:"#ef444418",icon:"🔴"};
}
// Funções de edição dos valores de referência
function milheiroRefInput(el){
  const prog  = el.dataset.prog;
  const campo = el.dataset.campo;
  const val   = el.value.trim();
  if(!store.milheiroRefs) store.milheiroRefs = {};
  if(!store.milheiroRefs[prog]) store.milheiroRefs[prog] = {};
  store.milheiroRefs[prog][campo] = campo==="nota" ? val : (val===""?"":Number(val.replace(",",".")));
  saveStore();
  // Feedback visual no input sem re-render completo
  el.style.borderColor = "#C9A84C80";
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.borderColor=""; }, 1200);
}
function resetMilheiroRefs(){
  if(!confirm("Restaurar todos os valores de referência para os padrões? Suas alterações serão perdidas.")) return;
  store.milheiroRefs = {};
  saveStore();
  render();
}

const SUPA_FN = window.SUPA_FN || "https://lpjsxhebdstbgzcgttgm.supabase.co/functions/v1/vetur-auth";

async function supaCall(payload){
  try{
    const r = await fetch(SUPA_FN, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({app:"gestao",...payload})
    });
    return r.ok ? await r.json() : {ok:false,erro:"Erro de rede"};
  }catch(e){ return {ok:false,erro:e.message}; }
}

async function loadStoreSupabase(){
  try{
    const res = await supaCall({action:"load"});
    if(!res.ok) return false;
    if(res.config){
      store.apiKey = res.config.api_key||"";
      store.iaPrompt = res.config.ia_prompt||store.iaPrompt;
      store.milheiroRefs = res.config.milheiro_refs||{};
      if(res.config.cotacao_dolar) store.cotacaoDolarManual = Number(res.config.cotacao_dolar);
    }
    if(res.clientes) store.clientes = res.clientes;
    if(res.programas && res.programas.length) store.programas = res.programas;
    if(res.movimentacoes) store.movs = res.movimentacoes.map(m=>({
      ...m, ...(m.dados_json||{})
    }));
    PROGRAMAS_DEFAULT.forEach(pd=>{ if(!store.programas.find(p=>p.nome===pd.nome)) store.programas.push({...pd}); });
    saveStoreLocal();
    return true;
  }catch(e){ console.warn("Supabase load:",e.message); return false; }
}

async function saveStoreSupabase(){
  try{
    await supaCall({action:"save", dados:{
      config:{
        api_key: store.apiKey||"",
        ia_prompt: store.iaPrompt,
        milheiro_refs: store.milheiroRefs||{},
        cotacao_dolar: store.cotacaoDolarManual||null
      },
      clientes: store.clientes,
      programas: store.programas
    }});
  }catch(e){ console.warn("Supabase save:",e.message); }
  saveStoreLocal();
}

function getMovs(tag){
  return store.movs.filter(m=>m.tag===tag);
}
function getSaldos(tag){
  const s={};
  store.programas.forEach(p=>s[p.nome]=0);
  getMovs(tag).forEach(m=>{
    if(s[m.clube]===undefined) s[m.clube]=0;
    if(["Acúmulo","Compra Pontos/Milhas","Transferência"].includes(m.tipo)) s[m.clube]+=Number(m.qtd||0);
    else s[m.clube]-=Number(m.qtd||0);
  });
  return s;
}
function getTotais(tag){
  const movs=getMovs(tag);
  const inv = movs.filter(m=>["Compra Pontos/Milhas","Assinatura"].includes(m.tipo)).reduce((a,m)=>a+Number(m.valor||0),0);
  const vnd = movs.filter(m=>m.tipo==="Venda").reduce((a,m)=>a+Number(m.valor||0),0);
  const mil = Object.values(getSaldos(tag)).reduce((a,b)=>a+Math.max(b,0),0);
  return {inv,vnd,lucro:vnd-inv,mil};
}

function bindLogin(){
  const email=document.getElementById("l-email");
  const senha=document.getElementById("l-senha");
  const btn=document.getElementById("l-btn");
  const err=document.getElementById("l-err");
  const eye=document.getElementById("l-eye");

  function upd(){ btn.disabled=!(email.value.trim()&&senha.value); }
  email.addEventListener("input",upd);
  senha.addEventListener("input",upd);
  senha.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!btn.disabled) btn.click(); });

  eye.addEventListener("click",()=>{
    senha.type = senha.type==="password"?"text":"password";
    eye.textContent = senha.type==="password"?"👁":"🙈";
  });

  btn.addEventListener("click",()=>{
    const e=email.value.trim().toLowerCase();
    const s=senha.value;
    err.classList.add("hidden");
    btn.textContent="Verificando…"; btn.disabled=true;
    supaCall({action:"login", email:e, senha:s}).then(res=>{
      if(res.ok){
        if(res.tipo==="master"){
          session={tipo:"master",nome:"Administrador",email:e};
          curCliente=store.clientes[0]?.tag||"";
        } else {
          session={tipo:"cliente",nome:res.nome,tag:res.tag,email:e};
          curCliente=res.tag;
        }
        saveSession(); render(); return;
      }
      err.textContent="E-mail ou senha incorretos.";
      err.classList.remove("hidden");
      btn.textContent="Entrar →"; btn.disabled=false;
    });
  });
}

  if(tab==="base"&&isMaster) return renderBase();
  if(tab==="movs") return renderMovs(saldos,totais,clienteAtivo,isMaster);
  if(tab==="programas") return renderProgramas(saldos,isMaster);
  if(tab==="cartoes") return renderCartoes();
  if(tab==="calc") return renderCalc(saldos,totais);
  if(tab==="config"&&isMaster) return renderConfig();
  return "";
}

// ---- DASHBOARD ----
function renderDashboard(saldos,totais,clienteAtivo,isMaster){
  const movs=getMovs(curCliente);
  const progComSaldo=store.programas.filter(p=>(saldos[p.nome]||0)>0);
  const maxMil=Math.max(...progComSaldo.map(p=>saldos[p.nome]||0),1);

  // ── Custo do milheiro por programa ──
  // Para cada programa: soma o valor investido nas movs de compra daquele clube
  // dividido pelo total de pontos comprados/acumulados naquele clube
  const custoPorProg = {};
  store.programas.forEach(p=>{
    const movsClube = movs.filter(m=>m.clube===p.nome);
    const valorGasto = movsClube
      .filter(m=>["Compra Pontos/Milhas","Assinatura"].includes(m.tipo))
      .reduce((a,m)=>a+Number(m.valor||0),0);
    const pontosComprados = movsClube
      .filter(m=>["Compra Pontos/Milhas","Transferência","Acúmulo"].includes(m.tipo))
      .reduce((a,m)=>a+Number(m.qtd||0),0);
    // Custo do milheiro = (valor gasto / pontos) * 1000
    custoPorProg[p.nome] = pontosComprados>0 && valorGasto>0
      ? (valorGasto / pontosComprados) * 1000
      : null;
  });

  // Custo médio geral da carteira
  const custoMedioGeral = totais.mil>0 && totais.inv>0
    ? (totais.inv / totais.mil) * 1000
    : null;

  // ── Barra de saldo por programa COM custo do milheiro ──
  const barsHTML = progComSaldo.slice(0,10).map(p=>{
    const custo = custoPorProg[p.nome];
    const custoStr = custo!=null ? fmtR(custo) : "—";
    const custoColor = custo==null ? G.muted : custo<=25?G.green:custo<=40?G.gold:G.red;
    return `
    <div class="bar-row">
      <div class="bar-label">
        <span style="color:${G.gold};font-weight:600">${esc(p.nome)}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="mono">${fmt(saldos[p.nome])}</span>
          <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:${custoColor}18;color:${custoColor};border:1px solid ${custoColor}30">
            milheiro: ${custoStr}

        </div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max((saldos[p.nome]/maxMil)*100,2)}%"></div></div>
    </div>`;

  // ── Tabela custo do milheiro por programa (todos com custo calculável) ──
  const progComCusto = store.programas
    .filter(p=>custoPorProg[p.nome]!=null)

  const custoRows = progComCusto.map(p=>{

    return `<div class="prog-card" style="position:relative">

// ---- SIMULADOR CARTÕES ----
function renderCartoes(){
  const bancos=["Todos",...new Set(CARTOES.map(c=>c.banco))];
  const progs=["Todos",...new Set(CARTOES.flatMap(c=>Object.keys(c.pts)))];

  const filtered=CARTOES.filter(c=>{
    const q=simBusca.toLowerCase();
    return (!q||c.nome.toLowerCase().includes(q)||c.banco.toLowerCase().includes(q))
      &&(filtBanco==="Todos"||c.banco===filtBanco)
      &&(filtTier==="Todos"||c.tier===filtTier)
      &&(filtProg==="Todos"||Object.keys(c.pts).includes(filtProg));
  });

  const selecionados=CARTOES.filter(c=>simSel.includes(c.nome));

  // Resultado detalhado: para cada cartão selecionado, cada programa, calcular milhas e valores
  const resultados=selecionados.flatMap(c=>
    Object.entries(c.pts).map(([prog,taxaPorDolar])=>{
      // taxa é pts/US$ (por dólar), convertemos o gasto R$ → US$:
      // Converter R$ para US$ usando cotação atual
      const gastoUSD = simGasto / cotacaoDolar;
      const ptsMes   = Math.floor(gastoUSD * taxaPorDolar);
      const ptsAno   = ptsMes * 12;
      const gastoAno = simGasto * 12;
      // Custo do milheiro pela anuidade = anuidade / pts anuais * 1000
      const custoPorMilha = ptsAno>0 && c.anuidade>0 ? c.anuidade/ptsAno : 0;
      const custoPorMilheiro = custoPorMilha * 1000;
      return {c, prog, taxaPorDolar, ptsMes, ptsAno, gastoAno, gastoUSD,
              custoPorMilheiro: c.anuidade>0 ? custoPorMilheiro : 0};
    })
  ).sort((a,b)=>b.ptsMes-a.ptsMes);

  const maxPts = resultados[0]?.ptsMes||0;

  const tierBtns=["Todos","Premium","Alta Renda","Intermediário"].map(t=>{
    const [col,bg]=TIER_COLORS[t]||["#64748b","#64748b20"];
    const active=filtTier===t;
    return `<button onclick="setFiltTier('${t}')" style="padding:4px 12px;border-radius:20px;border:1px solid ${active?col+"80":G.cardBorder};background:${active?bg:"transparent"};color:${active?col:G.muted};font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer">${t==="Premium"?"👑 ":t==="Alta Renda"?"⭐ ":""}${t}</button>`;
  }).join("");

  const cardItems=filtered.map(c=>{
    const sel=simSel.includes(c.nome);
    const ptsMesEx=Math.floor((simGasto/cotacaoDolar)*(Object.values(c.pts)[0]||0));
    return `<div onclick="toggleCartao('${esc(c.nome)}')" style="background:${sel?G.gold+"10":G.surf};border:1px solid ${sel?G.gold+"50":G.cardBorder};border-radius:11px;padding:10px 12px;margin-bottom:7px;cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700;font-size:13px;color:${sel?G.gold:G.text}">${esc(c.nome)}</div>
          <div style="font-size:11px;color:${G.muted};margin-top:1px">${esc(c.banco)} · ${c.anuidade===0?"Sem anuidade":fmtR(c.anuidade)+"/ano"}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">

// ---- CALCULADORA ----
function renderCalc(saldos,totais){
  const p=Number(calcState.pontos)||0;
  const cm=(p/1000)*Number(calcState.custoMilheiro||0);
  const ct=cm+Number(calcState.taxas||0);
  const vd=Number(calcState.valorDinheiro||0);
  const ec=vd-ct;
  const melhor=ct<vd?"MILHAS":"DINHEIRO";

  const progComSaldo=store.programas.filter(x=>(saldos[x.nome]||0)>0);
  const maxMil=Math.max(...progComSaldo.map(x=>saldos[x.nome]||0),1);
  const barsHTML=progComSaldo.slice(0,8).map(x=>`
    <div class="bar-row">
      <div class="bar-label"><span style="color:${G.gold};font-weight:600">${esc(x.nome)}</span><span class="mono">${fmt(saldos[x.nome])}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max((saldos[x.nome]/maxMil)*100,2)}%"></div></div>
    </div>`).join("") || `<div style="color:${G.muted};font-size:13px">Nenhum saldo registrado ainda.</div>`;

  return `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:20px">
    <div class="card card-gold">
      <div class="serif" style="font-size:18px;font-weight:600;margin-bottom:16px">Emissão: Milhas vs Dinheiro</div>
      <div class="grid2">
        <div class="fgroup"><label class="flabel">Milhas Necessárias</label><input id="calc-pontos" type="text" inputmode="decimal" class="inp" value="${calcState.pontos}"/></div>
        <div class="fgroup"><label class="flabel">Custo do Milheiro (R$)</label><input id="calc-milheiro" type="text" inputmode="decimal" class="inp" value="${calcState.custoMilheiro}"/></div>
        <div class="fgroup"><label class="flabel">Taxas Aeroportuárias (R$)</label><input id="calc-taxas" type="text" inputmode="decimal" class="inp" value="${calcState.taxas}"/></div>
        <div class="fgroup"><label class="flabel">Melhor Oferta em Dinheiro (R$)</label><input id="calc-dinheiro" type="text" inputmode="decimal" class="inp" value="${calcState.valorDinheiro}"/></div>
      </div>
      <div class="surface" style="padding:14px;margin-top:12px">
        <div class="calc-row"><span style="font-size:13px;color:${G.muted}">Custo das Milhas</span><span class="mono" style="font-size:13px;font-weight:600">${fmtR(cm)}</span></div>
        <div class="calc-row"><span style="font-size:13px;color:${G.muted}">Custo Total</span><span class="mono" style="font-size:13px;font-weight:600">${fmtR(ct)}</span></div>
        <div class="calc-row"><span style="font-size:13px;color:${G.muted}">Valor em Dinheiro</span><span class="mono" style="font-size:13px;font-weight:600">${fmtR(vd)}</span></div>
        <div class="calc-row" style="border-bottom:none"><span style="font-size:13px;color:${G.muted}">Economia</span><span class="mono" style="font-size:13px;font-weight:600;color:${ec>=0?G.green:G.red}">${fmtR(Math.abs(ec))}</span></div>
      </div>
      <div class="result-box" style="background:${melhor==="MILHAS"?G.green+"15":G.gold+"15"};border:1px solid ${melhor==="MILHAS"?G.green:G.gold}28;color:${melhor==="MILHAS"?G.green:G.gold}">
        ✈️ Melhor: ${melhor}${melhor==="MILHAS"?` — economia de ${fmtR(ec)}`:" — mais barato em dinheiro"}
      </div>
    </div>
    <div class="card">
      <div class="serif" style="font-size:18px;font-weight:600;margin-bottom:16px">Rentabilidade da Carteira</div>
      <div class="surface" style="padding:14px">
        <div class="calc-row"><span style="font-size:13px;color:${G.muted}">Milhas em Carteira</span><span class="mono" style="font-size:13px;font-weight:600;color:${G.gold}">${fmt(totais.mil)}</span></div>
        <div class="calc-row"><span style="font-size:13px;color:${G.muted}">Total Investido</span><span class="mono" style="font-size:13px;font-weight:600">${fmtR(totais.inv)}</span></div>
        <div class="calc-row"><span style="font-size:13px;color:${G.muted}">Total Faturado</span><span class="mono" style="font-size:13px;font-weight:600;color:${G.green}">${fmtR(totais.vnd)}</span></div>
        <div class="calc-row" style="${totais.inv>0?"":"border-bottom:none"}"><span style="font-size:13px;color:${G.muted}">Lucro Líquido</span><span class="mono" style="font-size:13px;font-weight:600;color:${totais.lucro>=0?G.green:G.red}">${fmtR(totais.lucro)}</span></div>
        ${totais.inv>0?`<div class="calc-row" style="border-bottom:none"><span style="font-size:13px;color:${G.muted}">ROI</span><span class="mono" style="font-size:13px;font-weight:600;color:${totais.lucro>=0?G.green:G.red}">${((totais.lucro/totais.inv)*100).toFixed(1)}%</span></div>`:""}
      </div>
      <div style="margin-top:16px">
        <div style="font-size:10px;font-weight:700;color:${G.muted};text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Distribuição por Programa</div>
        ${barsHTML}
      </div>
    </div>
  </div>`;
}

function renderConfig(){
  // Carregar overrides salvos no store
  const refs = store.milheiroRefs || {};

  // Montar tabela de edição por categoria
  const grupos = {};
  PROGRAMAS_DEFAULT.forEach(p=>{
    if(!grupos[p.categoria]) grupos[p.categoria]=[];
    grupos[p.categoria].push(p);
  });

  const catColor = c => CAT_COLORS[c]||G.muted;

  const tabelaRefs = Object.entries(grupos).map(([cat, progs])=>{
    const rows = progs.map(p=>{
      const base = MILHEIRO_REF[p.nome]||{};
      const ov   = refs[p.nome]||{};
      const ex   = ov.excelente ?? base.excelente ?? "";
      const bm   = ov.bom       ?? base.bom       ?? "";
      const md   = ov.medio     ?? base.medio      ?? "";
      const ru   = ov.ruim      ?? base.ruim       ?? "";
      const vd   = ov.venda     ?? base.venda      ?? "";
      const nt   = ov.nota      ?? base.nota       ?? "";
      const inp  = (id,val,ph) =>
        `<input data-prog="${p.nome}" data-campo="${id}"
          value="${String(val)}" placeholder="${ph}"
          oninput="milheiroRefInput(this)"
          style="width:100%;background:${G.bg};border:1px solid ${G.cardBorder};color:${G.text};
                 padding:4px 7px;border-radius:6px;font-family:'JetBrains Mono',monospace;
                 font-size:12px;text-align:right;outline:none"/>`;
      return `<tr>
        <td style="white-space:nowrap;font-weight:600;font-size:12px">${p.nome}</td>
        <td>${inp("excelente",ex,"R$")}</td>
        <td>${inp("bom",bm,"R$")}</td>
        <td>${inp("medio",md,"R$")}</td>
        <td>${inp("ruim",ru,"R$")}</td>
        <td>${inp("venda",vd,"R$")}</td>
        <td><input data-prog="${p.nome}" data-campo="nota"
          value="${esc(nt)}" placeholder="Observação..."
          oninput="milheiroRefInput(this)"
          style="width:100%;min-width:160px;background:${G.bg};border:1px solid ${G.cardBorder};color:${G.muted};
                 padding:4px 7px;border-radius:6px;font-family:'DM Sans',sans-serif;
                 font-size:11px;outline:none"/></td>
      </tr>`;
    }).join("");
    return `
      <div class="card" style="margin-bottom:16px;overflow:visible">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <span style="color:${catColor(cat)};font-size:14px">●</span>
          <div class="serif" style="font-size:17px;font-weight:600">${cat}</div>
          <span style="font-size:11px;color:${G.muted}">${progs.length} programa(s)</span>
        </div>
        <div style="overflow-x:auto">
          <table style="min-width:700px">
            <thead><tr style="font-size:10px;color:${G.muted};text-transform:uppercase;letter-spacing:.5px">
              <th style="text-align:left;padding:6px 8px">Programa</th>
              <th style="color:#10b981">🟢 Excelente (R$)</th>
              <th style="color:#22c55e">🟢 Bom (R$)</th>
              <th style="color:#f59e0b">🟡 Regular (R$)</th>
              <th style="color:#ef4444">🔴 Caro (R$)</th>
              <th style="color:${G.muted}">Venda ref. (R$)</th>
              <th style="text-align:left">Nota</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }).join("");

function bindMain(){
  const isMaster=session.tipo==="master";

  // Header
  document.getElementById("btn-sair")?.addEventListener("click",()=>{ session=null; saveSession(); render(); });
  document.getElementById("btn-ia")?.addEventListener("click",()=>{ if(!iaMsgs.length) iaMsgs=[{role:"assistant",text:`Olá${!isMaster?", "+session.nome:""}! 👋 Sou a assistente VETUR com IA. Como posso te ajudar com milhas e cartões?`}]; iaOpen=true; render(); setTimeout(scrollIA,100); });
  document.getElementById("hdr-cliente")?.addEventListener("change",e=>{ curCliente=e.target.value; render(); });

  // Nav tabs
  document.querySelectorAll(".nav-btn").forEach(b=>b.addEventListener("click",e=>{ curTab=e.currentTarget.dataset.tab; render(); }));

  // Tab-specific bindings
  bindTabEvents(isMaster);
  bindModal(isMaster);
  bindIA();
}

function bindTabEvents(isMaster){
  // Dashboard: nothing interactive

  // Base
  document.getElementById("btn-novo-cliente")?.addEventListener("click",()=>{ modalState="cliente"; modalData={}; render(); bindMain(); });
  document.querySelectorAll("[data-goTo]").forEach(el=>el.addEventListener("click",e=>{ curCliente=e.currentTarget.dataset.goto; curTab="dashboard"; render(); }));
  document.querySelectorAll("[data-delCliente]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const id=Number(e.currentTarget.dataset.delcliente);
    store.clientes=store.clientes.filter(c=>c.id!==id);
    if(!store.clientes.find(c=>c.tag===curCliente)) curCliente=store.clientes[0]?.tag||"";
    saveStore(); render();
  }));

  // Movs
  document.getElementById("btn-nova-mov")?.addEventListener("click",()=>{ modalState="mov"; modalData={}; render(); bindMain(); });
  document.querySelectorAll("[data-delMov]").forEach(el=>el.addEventListener("click",e=>{
    const id=Number(e.currentTarget.dataset.delmov);
    store.movs=store.movs.filter(m=>m.id!==id); saveStore(); render();
  }));
  // movs-search usa oninput inline

  // Programas
  document.querySelectorAll(".cat-pill").forEach(el=>el.addEventListener("click",e=>{ filtCat=e.currentTarget.dataset.cat; render(); }));
  document.getElementById("btn-novo-prog")?.addEventListener("click",()=>{ modalState="prog"; modalData={}; render(); bindMain(); });
  document.querySelectorAll("[data-delProg]").forEach(el=>el.addEventListener("click",e=>{
    const n=e.currentTarget.dataset.delprog;
    store.programas=store.programas.filter(p=>p.nome!==n); saveStore(); render();
  }));

  // Simulador cartões — usa onclick inline

  // Calculadora — inputs numéricos sem re-render
  ["calc-pontos","calc-milheiro","calc-taxas","calc-dinheiro"].forEach((id,i)=>{
    const keys=["pontos","custoMilheiro","taxas","valorDinheiro"];
    const el=document.getElementById(id);
    if(!el) return;
    el.addEventListener("input",e=>{
      const v=e.target.value;
      const n=parseFloat(v.replace(",","."));
      if(!isNaN(n)) calcState[keys[i]]=n;
      // Atualiza só o resultado sem re-render completo
      updateCalcResult();
    });
  });

  // Config
  document.getElementById("btn-salvar-master")?.addEventListener("click",()=>{
    const e=document.getElementById("cfg-email")?.value?.trim();
    const s=document.getElementById("cfg-senha")?.value;
    if(e&&s){ store.master={email:e,senha:s}; saveStore(); }
  });
  document.querySelectorAll("[data-verCliente]").forEach(el=>el.addEventListener("click",e=>{ curCliente=e.currentTarget.dataset.vercliente; curTab="dashboard"; render(); }));
}



function updateCalcResult(){
  // Re-render só a calculadora sem mexer nos inputs
  const saldos=getSaldos(curCliente);
  const totais=getTotais(curCliente);
  const content=document.getElementById("main-content");
  if(content && curTab==="calc"){
    const p=Number(calcState.pontos)||0;
    const cm=(p/1000)*Number(calcState.custoMilheiro||0);
    const ct=cm+Number(calcState.taxas||0);
    const vd=Number(calcState.valorDinheiro||0);
    const ec=vd-ct;
    const melhor=ct<vd?"MILHAS":"DINHEIRO";

    // Update result values only
    const rows=content.querySelectorAll(".calc-row");
    if(rows.length>=4){
      rows[0].querySelector(".mono").textContent=fmtR(cm);
      rows[1].querySelector(".mono").textContent=fmtR(ct);
      rows[2].querySelector(".mono").textContent=fmtR(vd);
      rows[3].querySelector(".mono").textContent=fmtR(Math.abs(ec));
      rows[3].querySelector(".mono").style.color=ec>=0?G.green:G.red;
    }
    const resBox=content.querySelector(".result-box");
    if(resBox){
      resBox.style.background=melhor==="MILHAS"?G.green+"15":G.gold+"15";
      resBox.style.borderColor=melhor==="MILHAS"?G.green+"28":G.gold+"28";
      resBox.style.color=melhor==="MILHAS"?G.green:G.gold;
      resBox.textContent=`✈️ Melhor: ${melhor}${melhor==="MILHAS"?` — economia de ${fmtR(ec)}`:" — mais barato em dinheiro"}`;
    }
  }
}

    document.getElementById("modal-ok")?.addEventListener("click",()=>{
      const nome=document.getElementById("p-nome")?.value?.trim()?.toUpperCase();
      if(!nome) return;
      store.programas.push({nome,categoria:document.getElementById("p-cat")?.value||"Outros",tipo:document.getElementById("p-tipo")?.value||"milhas"});
      saveStore(); modalState=null; render();
    });
  }
  if(modalState==="cliente"){
    document.getElementById("modal-ok")?.addEventListener("click",()=>{
      const nome=document.getElementById("c-nome")?.value?.trim();
      const email=document.getElementById("c-email")?.value?.trim();
      const senha=document.getElementById("c-senha")?.value;
      if(!nome||!email||!senha) return;
      const tag=nome.toUpperCase().replace(/\s+/g,"_");
      const err=document.getElementById("c-err");
      if(store.clientes.find(c=>c.tag===tag||c.email.toLowerCase()===email.toLowerCase())){
        err.textContent="E-mail ou nome já cadastrado."; err.classList.remove("hidden"); return;
      }
      store.clientes.push({id:Date.now(),nome,tag,email,senha,cpf:document.getElementById("c-cpf")?.value||"",tel:document.getElementById("c-tel")?.value||""});
      curCliente=tag; saveStore(); modalState=null; render();
    });
  }
}

function bindIA(){
  document.getElementById("ia-close")?.addEventListener("click",()=>{ iaOpen=false; render(); });
  document.getElementById("ia-bg")?.addEventListener("click",e=>{ if(e.target.id==="ia-bg"){ iaOpen=false; render(); } });

  const input=document.getElementById("ia-input");
  const send=document.getElementById("ia-send");

  const doSend=async()=>{
    const txt=input?.value?.trim();
    if(!txt||iaLoading) return;
    input.value="";
    iaMsgs.push({role:"user",text:txt});
    iaLoading=true; render(); scrollIA();

    try{
      const isMaster=session.tipo==="master";
      const basePrompt = (store.iaPrompt || defaultStore().iaPrompt).trim();
      const sys = basePrompt + " " + (isMaster ? "Conversando com gestor/administrador VETUR." : "Conversando com cliente " + session.nome + " da VETUR.");
      const apiKey = (store.apiKey||"").trim();
      if(!apiKey){
        iaMsgs.push({role:"assistant",text:"⚠️ Chave de API não configurada. Acesse ⚙ Configurações e adicione sua chave Gemini."});
        iaLoading=false; render(); scrollIA(); bindIA(); return;
      }
      const history = iaMsgs.slice(0,-1).map(m=>({role:m.role==="user"?"user":"model",parts:[{text:m.text}]}));
      history.push({role:"user",parts:[{text:txt}]});
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const res = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({systemInstruction:{parts:[{text:sys}]},contents:history,generationConfig:{maxOutputTokens:800,temperature:0.7}})});
      const d = await res.json();
      if(d.error){ iaMsgs.push({role:"assistant",text:"Erro: "+d.error.message}); }
      else { iaMsgs.push({role:"assistant",text:d.candidates?.[0]?.content?.parts?.[0]?.text||"Sem resposta."}); }
    }catch(e){ iaMsgs.push({role:"assistant",text:"Erro de conexão: "+e.message}); }
    iaLoading=false; render(); scrollIA();
    // Re-bind after render
    document.getElementById("ia-input")?.focus();
    bindIA();
  };

  input?.addEventListener("keydown",e=>{ if(e.key==="Enter") doSend(); });
  send?.addEventListener("click",doSend);
}

}

// ── IA DE MILHAS ──
async function enviarIA(){
  const input = document.getElementById("ia-input");
  const btn   = document.getElementById("ia-btn");
  const txt   = input?.value?.trim();
  if(!txt || iaLoadingMilhas) return;
  input.value = "";
  iaMilhasMsgs.push({role:"user", text:txt});
  iaLoadingMilhas = true;
  if(btn) btn.disabled = true;

  // Mostrar loading
  function atualizarMsgs(extra){
    const el = document.getElementById("ia-msgs");
    if(!el) return;
    const G2 = {gold:"#C9A84C",goldD:"#A67C2A",text:"#E8EDF8",muted:"#4E6285"};
    el.innerHTML = iaMilhasMsgs.map(m=>`
      <div style="display:flex;justify-content:${m.role==="user"?"flex-end":"flex-start"}">
        <div style="max-width:85%;padding:8px 12px;border-radius:${m.role==="user"?"12px 12px 3px 12px":"12px 12px 12px 3px"};
          background:${m.role==="user"?"linear-gradient(135deg,"+G2.gold+","+G2.goldD+")":"#1B2A50"};
          color:${m.role==="user"?"#060C1E":G2.text};font-size:13px;line-height:1.5;white-space:pre-wrap">
          ${m.text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
        </div>
      </div>`).join("") + (extra||"");
    el.scrollTop = el.scrollHeight;
  }

  atualizarMsgs(`<div style="display:flex;justify-content:flex-start">
    <div style="padding:8px 12px;border-radius:12px 12px 12px 3px;background:#1B2A50;color:#4E6285;font-size:13px">✦ Analisando...</div>
  </div>`);

  try{
    const apiKey = (store.apiKey||"").trim();
    if(!apiKey){
      iaMilhasMsgs.push({role:"assistant", text:"⚠️ Chave de API não configurada.\n\nPara usar a IA gratuitamente:\n1. Acesse aistudio.google.com\n2. Clique em \"Get API key\" → \"Create API key\"\n3. Copie a chave e cole em ⚙ Configurações → campo Chave de API\n\nO Gemini oferece 1.500 requisições/dia grátis!"});
      iaLoadingMilhas=false; if(btn) btn.disabled=false;
      atualizarMsgs(); return;
    }

    const isMaster = session?.tipo==="master";
    const sysPrompt = ((store.iaPrompt||defaultStore().iaPrompt).trim())
      + " " + (isMaster
        ? "Conversando com gestor/administrador VETUR."
        : "Conversando com cliente " + session.nome + " da VETUR.");

    // Montar histórico para Gemini (formato contents)
    const history = iaMilhasMsgs.slice(0,-1).map(m=>({
      role: m.role==="user" ? "user" : "model",
      parts:[{text: m.text}]
    }));
    // Última mensagem do usuário
    history.push({role:"user", parts:[{text:txt}]});

    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
    const res = await fetch(url, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        systemInstruction:{parts:[{text: sysPrompt}]},
        contents: history,
        generationConfig:{maxOutputTokens:800, temperature:0.7}
      })
    });
    const d = await res.json();
    if(d.error){
      const msg = d.error.message||"Erro desconhecido";
      iaMilhasMsgs.push({role:"assistant", text:"Erro da API: "+msg+(msg.includes("API_KEY")?" — verifique sua chave em ⚙ Configurações":"")});
    } else {
      const resp = d.candidates?.[0]?.content?.parts?.[0]?.text || "Sem resposta.";
      iaMilhasMsgs.push({role:"assistant", text:resp});
    }
  } catch(e){
    iaMilhasMsgs.push({role:"assistant", text:"Erro de conexão: "+e.message});
  }

  iaLoadingMilhas = false;
  if(btn) btn.disabled = false;
  atualizarMsgs();
}


// ── Debounce para inputs de busca — evita perder foco durante digitação ──
let _debounceTimer = null;
function renderDebounce(delay){
  clearTimeout(_debounceTimer);
  _debounceTimer = setTimeout(()=>{ render(); }, delay||220);
}

function simBuscaInput(val){
  simBusca = val;
  // Atualizar só a lista e o resultado, SEM re-renderizar o input
  const listaEl = document.getElementById("sim-lista");
  const resEl   = document.getElementById("sim-resultado");
  if(!listaEl) { renderDebounce(200); return; }

  // Recalcular filtered e resultado
  const q = val.toLowerCase();
  const filtered = CARTOES.filter(c=>{
    return (!q || c.nome.toLowerCase().includes(q) || c.banco.toLowerCase().includes(q))
      && (filtBanco==="Todos" || c.banco===filtBanco)
      && (filtTier==="Todos"  || c.tier===filtTier)
      && (filtProg==="Todos"  || Object.keys(c.pts).includes(filtProg));
  });

  const cardItems = filtered.map(c=>{
    const sel = simSel.includes(c.nome);
    const ptsMesEx = Math.floor((simGasto/cotacaoDolar)*(Object.values(c.pts)[0]||0));
    return `<div onclick="toggleCartao('${esc(c.nome)}')" style="background:${sel?G.gold+'10':G.surf};border:1px solid ${sel?G.gold+'50':G.cardBorder};border-radius:11px;padding:10px 12px;margin-bottom:7px;cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700;font-size:13px;color:${sel?G.gold:G.text}">${esc(c.nome)}</div>
          <div style="font-size:11px;color:${G.muted};margin-top:1px">${esc(c.banco)} · ${c.anuidade===0?"Sem anuidade":fmtR(c.anuidade)+"/ano"}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="text-align:right">
            <div style="font-size:14px;font-weight:700;color:${sel?G.gold:G.muted};font-family:'JetBrains Mono',monospace">${fmt(ptsMesEx)}</div>
            <div style="font-size:9px;color:${G.muted}">pts/mês</div>
          </div>
          <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${sel?G.gold:G.muted};background:${sel?G.gold:"transparent"};display:flex;align-items:center;justify-content:center;color:#060C1E;font-size:11px">${sel?"✓":""}</div>
        </div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:7px">
        ${Object.entries(c.pts).map(([p,t])=>`<span style="background:${G.gold}18;color:${G.gold};border:1px solid ${G.gold}30;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px">${esc(p)}: ${t} pts/US$</span>`).join("")}
      </div>
    </div>`;
  }).join("") || `<div style="text-align:center;padding:40px;color:${G.muted}">Nenhum cartão encontrado</div>`;

  listaEl.innerHTML = cardItems;

  // Atualizar resultado se houver cartões selecionados
  if(resEl && simSel.length>0){
    // Só re-renderiza o resultado, não mexe no input
    clearTimeout(_debounceTimer);
    _debounceTimer = setTimeout(()=>{
      const resEl2 = document.getElementById("sim-resultado");
      if(resEl2){
        const selecionados = CARTOES.filter(c=>simSel.includes(c.nome));
        if(selecionados.length) render(); // resultado precisa de render completo
      }
    }, 400);
  }
}

// ── Cotação do dólar ──
let cotacaoDolar = 5.80; // fallback caso APIs falhem

async function buscarCotacaoDolar(){
  // Se admin definiu manual, usar essa
  if(store.cotacaoDolarManual && store.cotacaoDolarManual > 1){
    cotacaoDolar = store.cotacaoDolarManual;
    return;
  }
  // Tenta AwesomeAPI primeiro
  try{
    const r1 = await fetch("https://economia.awesomeapi.com.br/json/last/USD-BRL");
    const d1 = await r1.json();
    const v1 = parseFloat(d1?.USDBRL?.bid);
    if(v1 && v1 > 1){ cotacaoDolar = v1; return; }
  }catch(e){}
  // Fallback: ExchangeRate-API (sem chave)
  try{
    const r2 = await fetch("https://open.er-api.com/v6/latest/USD");
    const d2 = await r2.json();
    const v2 = parseFloat(d2?.rates?.BRL);
    if(v2 && v2 > 1){ cotacaoDolar = v2; return; }
  }catch(e){}
  // Fallback silencioso — mantém valor padrão
}
