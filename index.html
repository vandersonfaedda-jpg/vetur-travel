<title>VETUR Travel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;overflow-y:auto;-webkit-overflow-scrolling:touch;}
body{background:#060C1E;color:#E8EDF8;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#1B2A5040;border-radius:2px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#C9A84C88!important;}
select option{background:#0C1525;}
.serif{font-family:'Cormorant Garamond',serif;}
.mono{font-family:'JetBrains Mono',monospace;}

/* TOKENS */
:root{
  --gold:#C9A84C;--goldL:#F0D080;--goldD:#A67C2A;
  --bg:#060C1E;--card:#0C1525;--surf:#111E38;--surf2:#162040;
  --border:#1B2A5022;--text:#E8EDF8;--muted:#4E6285;
  --green:#10b981;--red:#ef4444;--blue:#3b82f6;--amber:#f59e0b;
}

/* LAYOUT */
#app{min-height:100vh;background:var(--bg);}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;cursor:pointer;gap:4px;transition:color .2s;}
.bnav-btn.active{color:var(--gold);}
.bnav-ico{font-size:18px;line-height:1;}
.content{padding:16px 16px 90px;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;}
.card-gold{border-color:#C9A84C28;}
.surf{background:var(--surf);border-radius:10px;padding:14px;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);}
.login-card{background:var(--card);border:1px solid #C9A84C22;border-radius:24px;padding:40px 32px;width:100%;max-width:400px;}
.login-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;gap:8px;}
.login-logo img{height:80px;width:auto;object-fit:contain;}
.login-tag{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;text-align:center;}
.inp{width:100%;background:var(--surf);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;}
.inp-pw{padding-right:44px;}
.flabel{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.fgroup{margin-bottom:14px;}
.pw-wrap{position:relative;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;}
.btn-gold{background:linear-gradient(135deg,#C9A84C,#A67C2A);color:#060C1E;border:none;border-radius:10px;padding:12px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;}
.login-err{background:#ef444415;border:1px solid #ef444430;color:#ef4444;border-radius:8px;padding:9px 13px;font-size:12px;margin-top:10px;text-align:center;}
.btn-ghost{background:var(--surf);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:7px;}
.btn-danger{background:#ef444415;color:#ef4444;border:1px solid #ef444425;border-radius:8px;padding:5px 12px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
.btn-link{background:none;border:none;color:var(--gold);font-size:12px;cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif;}

/* BADGES */
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;}

/* STATUS */
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}

/* SECTION TITLE */
.sec-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;margin-bottom:14px;}
.sec-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* INFO ROW */
.info-row{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1B2A501A;gap:12px;}
.info-row:last-child{border-bottom:none;}
.info-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;padding-top:1px;}
.info-val{font-size:13px;color:var(--text);text-align:right;line-height:1.4;}
.info-val a{color:var(--gold);text-decoration:none;}

/* TIMELINE */
.timeline{position:relative;padding-left:24px;}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:var(--surf2);}
.tl-item{position:relative;margin-bottom:20px;}
.tl-dot{position:absolute;left:-22px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--gold);border:2px solid var(--card);flex-shrink:0;}
.tl-dot.done{background:var(--green);}
.tl-dot.next{background:var(--gold);box-shadow:0 0 0 3px #C9A84C25;}
.tl-time{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:2px;}
.tl-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;}
.tl-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.tl-tag{display:inline-block;margin-top:6px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}

/* FLIGHT CARD */
.flight-card{background:var(--surf);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border);}
.flight-route{display:flex;align-items:center;gap:8px;margin:10px 0;}
.flight-city{font-size:22px;font-weight:700;font-family:'Cormorant Garamond',serif;}
.flight-arrow{flex:1;display:flex;align-items:center;gap:4px;color:var(--muted);}
.flight-arrow::before,.flight-arrow::after{content:'';flex:1;height:1px;background:var(--border);}
.flight-time{font-size:12px;color:var(--muted);}
.flight-badge{background:#3b82f620;color:#3b82f6;border:1px solid #3b82f630;}

/* HOTEL CARD */
.hotel-card{background:var(--surf);border-radius:14px;padding:16px;margin-bottom:12px;}
.hotel-stars{color:var(--gold);font-size:13px;letter-spacing:1px;}

/* TRANSFER CARD */
.transfer-card{background:var(--surf);border-radius:14px;padding:16px;margin-bottom:12px;display:flex;gap:14px;align-items:flex-start;}
.transfer-ico{width:40px;height:40px;border-radius:10px;background:#C9A84C18;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}

/* DOC CARD */
.doc-card{background:var(--surf);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.doc-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}

/* FINANCIAL */
.fin-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #1B2A501A;}
.fin-item:last-child{border-bottom:none;}
.fin-check{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px;}
.fin-check.yes{background:#10b98120;color:#10b981;}
.fin-check.no{background:#ef444415;color:#ef4444;}

/* SUPPORT */
.contact-card{background:var(--surf);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.contact-left{display:flex;align-items:center;gap:12px;}
.contact-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.contact-btns{display:flex;gap:6px;}
.contact-btn{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;font-size:16px;}

/* HOME HERO */
.hero{background:linear-gradient(135deg,#0D1B4B,#162040);border:1px solid #C9A84C22;border-radius:18px;padding:22px 18px;margin-bottom:16px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;border-radius:50%;background:#C9A84C08;}
.hero-dest{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:4px;}
.hero-dates{font-size:13px;color:#8899BB;margin-bottom:14px;}
.hero-chips{display:flex;gap:8px;flex-wrap:wrap;}
.hero-chip{background:#ffffff12;border:1px solid #ffffff18;border-radius:20px;padding:4px 11px;font-size:11px;color:#C0C8D8;}

/* QUICK STATS */
.qstats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.qstat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.qstat-val{font-size:20px;font-weight:700;font-family:'Cormorant Garamond',serif;color:var(--gold);}
.qstat-label{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}

/* DAY SELECTOR */
.day-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;-webkit-overflow-scrolling:touch;}
.day-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 14px;border-radius:12px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;}
.day-btn.active{background:linear-gradient(135deg,var(--gold),var(--goldD));border-color:transparent;color:#060C1E;}
.day-num{font-size:18px;font-weight:700;line-height:1;}
.day-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:#00000095;z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-box{background:var(--card);border:1px solid #C9A84C22;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--surf2);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;margin-bottom:16px;}

/* ADMIN */
.admin-tab-bar{
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;
}
.admin-tab{padding:6px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
.admin-tab.active{background:var(--gold);border-color:var(--gold);color:#060C1E;}
.admin-row{background:var(--surf);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
textarea.inp{resize:vertical;min-height:80px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tag-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tag-pill{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:#C9A84C18;color:var(--gold);border:1px solid #C9A84C30;}

@media(min-width:600px){.content{max-width:640px;margin:0 auto;padding:20px 20px 90px;}}

/* ─── IMPORT FORM ─── */
.import-sec{background:var(--surf);border-radius:12px;margin-bottom:10px;overflow:hidden;border:1px solid var(--border);}
.import-sec-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surf2);}
.import-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;}
.import-toggle input{accent-color:#C9A84C;width:16px;height:16px;}
.import-fields{padding:14px;display:block;}


/* ─── PDF PRINT STYLES ─── */
#pdf-overlay{position:fixed;inset:0;background:rgba(6,12,30,0.96);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#pdf-overlay .pdf-spinner{width:40px;height:40px;border:3px solid #C9A84C40;border-top-color:#C9A84C;border-radius:50%;animation:spin 0.8s linear infinite;}
#pdf-overlay p{color:#E8EDF8;font-size:14px;font-family:'DM Sans',sans-serif;}
@media print{
  body{background:#fff!important;color:#1a1a1a!important;}
  .header,.bottom-nav,#pdf-overlay{display:none!important;}
  .content{padding:0!important;max-width:none!important;}
  #print-doc{display:block!important;}
  #app>*:not(#print-doc){display:none!important;}
}
</style>

// Upload de arquivo — converte para base64 e salva no Firestore
async function uploadArquivo(file, viagemId, onProgress){
  // Lê o arquivo em memória para a IA processar
  // Não salva no Firestore (evita travamento com arquivos grandes)
  return new Promise((resolve, reject)=>{
    if(onProgress) onProgress(50);
    try{
      const url = URL.createObjectURL(file);
      if(onProgress) onProgress(100);
      resolve(url);
    }catch(e){
      reject(e);
    }
  });
}

// Abrir arquivo do Firestore
async function abrirArquivoFirestore(fileId){
  if(!_fbReady || !_db) return;
  try{
    const {doc, getDoc} = window._firebaseModules;
    const snap = await getDoc(doc(_db, "arquivos", fileId));
    if(snap.exists()){
      const d = snap.data();
      const win = window.open();
      win.document.write(`<iframe src="${d.data}" width="100%" height="100%" style="border:none;position:fixed;top:0;left:0;"></iframe>`);
    }
  }catch(e){ alert("Erro ao abrir arquivo: "+e.message); }
}

async function loadStoreFirebase(){
  if(!_fbReady||!_db) return false;
  try{
    const {doc,getDoc}=window._firebaseModules;
    const snap=await getDoc(doc(_db,"vetur","store"));
    if(snap.exists()){
      store=snap.data();
      if(!store.apiKey) store.apiKey="";
      if(!store.iaPrompt) store.iaPrompt=defaultIaPrompt();
      return true;
    }
    // Primeiro uso — salvar demo no Firebase
    await saveStoreFirebase();
    return true;
  }catch(e){ console.warn("Firebase load:",e.message); return false; }
}

async function saveStoreFirebase(){
  if(!_fbReady||!_db){ saveStoreLocal(); return; }
  try{
    const {doc,setDoc}=window._firebaseModules;
    await setDoc(doc(_db,"vetur","store"),store);
    saveStoreLocal();
  }catch(e){ saveStoreLocal(); }
}

function saveStoreLocal(){
  try{localStorage.setItem(SK,JSON.stringify(store));}catch(e){}

// Sanitiza URLs — bloqueia javascript:, data:, vbscript: e outros protocolos perigosos
function safeUrl(url){
  if(!url) return "#";
  const u = String(url).trim();
  // Permite: https://, http://, tel:, mailto:, https://wa.me, # e caminhos relativos
  if(/^(https?:\/\/|tel:|mailto:|#|\/(?!\/))/.test(u)) return u;

  if(/^(javascript|data|vbscript|blob):/i.test(u)) return "#";
  return "#";
}

// ── Segurança — hash de senha ──
// ── PBKDF2 password hashing (WebCrypto API) ──────────────────────────────
// Muito mais seguro que SHA-256 simples — resistente a brute force
const PBKDF2_ITERATIONS = 200000; // 200k iterações
const PBKDF2_SALT = "vetur_pbkdf2_salt_v1_2025"; // salt fixo para compatibilidade

async function hashSenha(senha){
  try{
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      "raw", enc.encode(senha), { name: "PBKDF2" }, false, ["deriveBits"]
    );
    const bits = await crypto.subtle.deriveBits({
      name: "PBKDF2",
      salt: enc.encode(PBKDF2_SALT),
      iterations: PBKDF2_ITERATIONS,
      hash: "SHA-256"
    }, keyMaterial, 256);
    return Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch(e){
    // Fallback: SHA-256 se PBKDF2 não disponível (ambiente antigo)
    try{
      const msgBuffer = new TextEncoder().encode(senha + "vetur_salt_2025");
      const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
      return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }catch(e2){ return senha; }
  }
}

// Verificar senha — aceita hash novo ou senha antiga em texto puro (migração)
async function verificarSenha(senhaDigitada, senhaArmazenada){
  if(!senhaArmazenada) return false;
  // Se já é um hash (64 chars hex), comparar com hash da digitada
  if(senhaArmazenada.length === 64 && /^[0-9a-f]+$/.test(senhaArmazenada)){
    const hash = await hashSenha(senhaDigitada);
    return hash === senhaArmazenada;
  }
  // Senha antiga em texto puro — aceitar e migrar
  return senhaDigitada === senhaArmazenada;
}

// ── Rate limiting / Brute-force protection ────────────────────────────────
const _loginAttempts = {}; // { email: { count, lockUntil } }
const LOGIN_MAX_ATTEMPTS = 5;
const LOGIN_LOCKOUT_MS = 5 * 60 * 1000; // 5 minutos

function checkLoginRateLimit(email){
  const key = email.toLowerCase().trim();
  const now = Date.now();
  if(!_loginAttempts[key]) _loginAttempts[key] = { count: 0, lockUntil: 0 };
  const rec = _loginAttempts[key];
  if(rec.lockUntil > now){
    const mins = Math.ceil((rec.lockUntil - now) / 60000);
    return { blocked: true, message: `Muitas tentativas incorretas. Aguarde ${mins} minuto(s) para tentar novamente.` };
  }
  return { blocked: false };
}

function recordLoginFailure(email){
  const key = email.toLowerCase().trim();
  const now = Date.now();
  if(!_loginAttempts[key]) _loginAttempts[key] = { count: 0, lockUntil: 0 };
  const rec = _loginAttempts[key];
  rec.count++;
  if(rec.count >= LOGIN_MAX_ATTEMPTS){
    rec.lockUntil = now + LOGIN_LOCKOUT_MS;
    rec.count = 0;
  }
}

function clearLoginFailures(email){
  delete _loginAttempts[email.toLowerCase().trim()];
}

// ── XSS sanitization (adicional ao esc()) ────────────────────────────────
// esc() já escapa para HTML — esta versão remove tags completamente
function sanitize(str){
  if(!str) return "";
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#x27;")
    .replace(/\//g,"&#x2F;")
    .replace(/javascript:/gi,"")
    .replace(/on\w+\s*=/gi,"");
}

// ── Input validation ──────────────────────────────────────────────────────
function validateEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
}

function validatePassword(senha){
  if(!senha || senha.length < 4) return { valid: false, msg: "Senha muito curta (mínimo 4 caracteres)." };
  if(senha.length > 128) return { valid: false, msg: "Senha inválida." };
  return { valid: true };
}

async function bindLogin(){
  const em=document.getElementById("l-email");
  const pw=document.getElementById("l-senha");
  const btn=document.getElementById("l-btn");
  const err=document.getElementById("l-err");
  const eye=document.getElementById("l-eye");
  if(!em||!pw||!btn) return;
  function upd(){ btn.disabled=!(em.value.trim()&&pw.value); }
  em.addEventListener("input",upd);
  pw.addEventListener("input",upd);
  pw.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!btn.disabled) btn.click(); });
  if(eye) eye.addEventListener("click",()=>{ pw.type=pw.type==="password"?"text":"password"; eye.textContent=pw.type==="password"?"👁":"🙈"; });
  btn.addEventListener("click", async ()=>{
    const e=em.value.trim().toLowerCase();
    const s=pw.value;
    if(err) err.classList.add("hidden");

    // Input validation
    if(!validateEmail(e)){
      if(err){ err.textContent="E-mail inválido."; err.classList.remove("hidden"); }
      return;
    }
    const pwCheck = validatePassword(s);
    if(!pwCheck.valid){
      if(err){ err.textContent=pwCheck.msg; err.classList.remove("hidden"); }
      return;
    }

    // Rate limit check
    const rlCheck = checkLoginRateLimit(e);
    if(rlCheck.blocked){
      if(err){ err.textContent=rlCheck.message; err.classList.remove("hidden"); }
      return;
    }

    if(err) err.classList.add("hidden");
    btn.textContent="Verificando…"; btn.disabled=true;
    setTimeout(async ()=>{
      const masterEmail=(store.empresa?.master?.email||"admin@vetur.com.br").toLowerCase();
      const masterSenha=store.empresa?.master?.senha||"VeturTravel@2026!";
      // Verificar admin (suporta hash e texto puro para migração)
      const isAdmin = await verificarSenha(s, masterSenha);
      if(e===masterEmail && isAdmin){
        // Migrar senha para hash se ainda for texto puro
        if(masterSenha.length !== 64){
          const hashed = await hashSenha(masterSenha);
          if(!store.empresa) store.empresa={};
          if(!store.empresa.master) store.empresa.master={};
          store.empresa.master.senha = hashed;
          saveStore();
        }
        clearLoginFailures(e);
        session={tipo:"admin",nome:"Admin VETUR",viagemSel:store.viagens[0]?.id};
        saveSession(); resetSessionTimer(); render(); return;
      }
      // Verificar cliente
      let clienteAuth = null;
      for(const c of store.clientes){
        if(c.email.toLowerCase()===e){
          const ok = await verificarSenha(s, c.senha);
          if(ok){ clienteAuth=c; break; }
        }
      }
      if(clienteAuth){
        // Migrar senha para hash se ainda for texto puro
        if(clienteAuth.senha.length !== 64){
          clienteAuth.senha = await hashSenha(clienteAuth.senha);
          saveStore();
        }
        clearLoginFailures(e);
        session={tipo:"cliente",id:clienteAuth.id,nome:clienteAuth.nome,email:clienteAuth.email};
        saveSession(); resetSessionTimer(); render(); return;
      }
      recordLoginFailure(e);
      const rlAfter = checkLoginRateLimit(e);
      const remaining = LOGIN_MAX_ATTEMPTS - (_loginAttempts[e]?.count||0);
      if(rlAfter.blocked){
        if(err){ err.textContent=rlAfter.message; err.classList.remove("hidden"); }
      } else {
        const tentMsg = remaining <= 2 ? ` (${remaining} tentativa(s) restante(s) antes do bloqueio)` : "";
        if(err){ err.textContent="E-mail ou senha incorretos."+tentMsg; err.classList.remove("hidden"); }
      }
      btn.textContent="Entrar →"; btn.disabled=false;
    },600);
  });
}

          ${vooRef.checkIn&&vooRef.checkIn!="#"?`<a href="${safeUrl(vooRef.checkIn)}" target="_blank" style="flex:1;text-align:center;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">✈️ Check-in Online</a>`:""}
          <div style="flex:1;text-align:center;background:#3b82f615;border:1px solid #3b82f630;color:#3b82f6;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700">🔑 ${esc(vooRef.localizador||"—")}</div>
        </div>`;
      }
    }

    else if(r.tipo==="hotel"){
      const hotelRef = v.hoteis.find(h=>r.titulo.includes(h.nome));
      if(hotelRef){
        acoes += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">
          <a href="${safeUrl(hotelRef.mapa||"#")}" target="_blank" style="flex:1;text-align:center;background:var(--surf);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:12px;text-decoration:none">📍 Mapa</a>
          <a href="tel:${esc(hotelRef.telefone||"")}" style="flex:1;text-align:center;background:linear-gradient(135deg,var(--gold),var(--goldD));color:#060C1E;padding:8px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">📞 Ligar</a>
          <div style="flex:1;text-align:center;background:#C9A84C15;border:1px solid #C9A84C30;color:var(--gold);padding:8px;border-radius:8px;font-size:12px;font-weight:700"># ${esc(hotelRef.confirmacao||"—")}</div>
        </div>`;
      } else if(r.local){
        acoes += `<button onclick="openMap('${esc(r.local)}')" style="margin-top:8px;background:var(--surf);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;width:100%">📍 Ver no mapa</button>`;
      }
    }

    else if(r.tipo==="transfer"){
      const transRef = v.transfers.find(t=>r.titulo.includes(t.servico)||r.desc.includes(t.motorista||"xxx"));
      if(transRef && transRef.contato){
        acoes += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">
          <a href="tel:${esc(transRef.contato)}" style="flex:1;text-align:center;background:linear-gradient(135deg,#10b981,#059669);color:#fff;padding:8px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">📞 ${esc(transRef.motorista||"Motorista")}</a>
          ${transRef.contato.replace(/\D/g,"").length>=10?`<a href="https://wa.me/${transRef.contato.replace(/\D/g,"")}" target="_blank" style="flex:1;text-align:center;background:#25D36620;color:#25D366;border:1px solid #25D36630;padding:8px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">💬 WhatsApp</a>`:""}
        </div>`;
      } else if(r.local){
        acoes += `<button onclick="openMap('${esc(r.local)}')" style="margin-top:8px;background:var(--surf);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;width:100%">📍 Ver rota</button>`;
      }
    }

    else if(r.tipo==="passeio"||r.tipo==="refeicao"){
      if(r.local){
        acoes += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">
          <button onclick="openMap('${esc(r.local)}')" style="flex:1;background:var(--surf);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:12px;cursor:pointer">📍 Ver no mapa</button>
          <a href="https://www.google.com/search?q=${encodeURIComponent(r.titulo+' '+r.local)}" target="_blank" style="flex:1;text-align:center;background:var(--surf);border:1px solid var(--border);color:var(--muted);padding:8px;border-radius:8px;font-size:12px;text-decoration:none">🔍 Buscar info</a>
        </div>`;
      }
    }

    else if(r.local){
      acoes += `<button onclick="openMap('${esc(r.local)}')" style="margin-top:8px;background:var(--surf);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;width:100%">📍 Ver no mapa</button>`;
    }

    // Documentos relacionados
    const docsRelac = (v.documentos||[]).filter(d=>{
      const tipos = r.tipo==="voo"?["passagem"]:r.tipo==="hotel"?["hotel"]:r.tipo==="transfer"?["transfer"]:["ingresso","passeio","voucher"];
      return tipos.includes(d.tipo||"");
    });
    const docsHtml = docsRelac.length ? `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px">
      ${docsRelac.slice(0,3).map(d=>`
        ${d.link&&d.link!="#"?(d.link.startsWith("firestore://")?
          `<button onclick="abrirArquivoFirestore('${d.link.replace('firestore://','')}')" style="background:#C9A84C15;color:var(--gold);border:1px solid #C9A84C30;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer">${d.icone||"📄"} ${esc(d.nome.substring(0,20))}</button>`:
          `<a href="${safeUrl(d.link)}" target="_blank" style="background:#C9A84C15;color:var(--gold);border:1px solid #C9A84C30;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;text-decoration:none">${d.icone||"📄"} ${esc(d.nome.substring(0,20))}</a>`
        ):""}`).join("")}
    </div>` : "";

    return `<div class="tl-item">
      <div class="tl-dot" style="background:${col}"></div>
      <div style="background:var(--surf);border-radius:12px;padding:14px;border-left:3px solid ${col}40">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <div class="tl-time">${r.horario}</div>
          <span style="background:${col}20;color:${col};font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">${esc(r.tipo)}</span>
        </div>
        <div class="tl-title">${tipoIcon(r.tipo)} ${esc(r.titulo)}</div>
        ${r.desc?`<div class="tl-desc">${esc(r.desc)}</div>`:""}
        ${r.local?`<div style="font-size:11px;color:var(--gold);margin-top:4px">📍 ${esc(r.local)}</div>`:""}
        ${acoes}
        ${docsHtml}
      </div>
    </div>`;
  }).join("") : `<div style="text-align:center;padding:30px;color:var(--muted)">Nenhuma atividade neste dia.</div>`;

  const fd=fmtDia(diaAtual);
  return `
  <div class="sec-title">Roteiro da viagem</div>
  <div class="day-scroll">${daySel}</div>
  <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:14px">
    ${fd.full} · Dia ${curDia+1} de ${dias.length}
  </div>
  <div class="timeline">${tl}</div>
  ${miniDocsBlock(v,["ingresso","passeio","voucher","seguro","cruzeiro","restaurante"],"Anexar ingressos, vouchers e tickets")}`;
}

// ── VOOS ──
function renderVoos(v){
  const cards=v.voos.map(f=>{
    const [or,dst]=f.trecho.split("→").map(s=>s.trim());
    const [sbg,sc]=f.status==="confirmado"?["#10b98120","#10b981"]:["#f59e0b20","#f59e0b"];
    return `<div class="flight-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-size:11px;color:var(--muted);font-weight:600">${esc(f.cia)} · <span class="mono">${esc(f.numero)}</span></div>
        </div>
        <div style="text-align:right">
          <span class="badge" style="background:${sbg};color:${sc};border:1px solid ${sc}30">${f.status}</span>
          ${Number(f.valor)>0?`<div style="font-size:14px;font-weight:700;color:${f.pagStatus==='pago'?'#10b981':'var(--gold)'};margin-top:3px">${fmtR(f.valor)}</div>`:""}
        </div>
      </div>
      <div class="flight-route">
        <div style="text-align:center"><div class="flight-city">${esc(or)}</div><div class="flight-time">${esc(f.saida)}</div></div>
        <div class="flight-arrow" style="color:var(--gold);font-size:18px">✈️</div>
        <div style="text-align:center"><div class="flight-city">${esc(dst||"")}</div><div class="flight-time">${esc(f.chegada)}</div></div>
      </div>
      <div style="height:1px;background:var(--border);margin:12px 0"></div>
      <div class="surf" style="padding:10px 12px;font-size:12px">
        <div class="info-row" style="padding:5px 0"><span class="info-label">Localizador</span><span class="mono" style="color:var(--gold);font-size:14px;font-weight:700">${esc(f.localizador)}</span></div>
        <div class="info-row" style="padding:5px 0"><span class="info-label">Terminal</span><span class="info-val">${esc(f.terminal)}</span></div>
        <div class="info-row" style="padding:5px 0"><span class="info-label">Bagagem</span><span class="info-val">${esc(f.bagagem)}</span></div>
        ${f.nota?`<div class="info-row" style="padding:5px 0"><span class="info-label">Obs</span><span class="info-val" style="color:var(--muted)">${esc(f.nota)}</span></div>`:""}
      </div>
      <a href="${safeUrl(f.checkIn)}" target="_blank" style="display:block;margin-top:12px;text-align:center;background:linear-gradient(135deg,var(--gold),var(--goldD));color:#060C1E;padding:10px;border-radius:9px;font-size:13px;font-weight:700;text-decoration:none">Fazer Check-in Online ↗</a>
    </div>`;
  }).join("");
  return `<div class="sec-title">Voos</div><div style="font-size:12px;color:var(--muted);margin-bottom:16px">${v.voos.length} voo(s) no itinerário</div>${cards}${miniDocsBlock(v,["passagem","voucher"],"Anexar passagem ou voucher de voo")}`;
}

      ${h.regras?`<div style="background:var(--surf2);border-radius:9px;padding:10px 12px;margin-top:8px;font-size:12px;color:var(--muted)">ℹ️ ${esc(h.regras)}</div>`:""}

        <a href="tel:${esc(h.telefone)}" style="display:block;text-align:center;background:linear-gradient(135deg,var(--gold),var(--goldD));color:#060C1E;padding:9px;border-radius:9px;font-size:12px;text-decoration:none;font-weight:700">📞 Ligar</a>

// ── TRANSFERS ──
function renderTransfers(v){
  const icons={transfer:"🚗","Carro Executivo":"🚘","Mercedes Classe E":"🚙","Van Executiva":"🚐","Sedan Executivo":"🚘","default":"🚗"};
  const cards=v.transfers.map(t=>`
    <div class="transfer-card">
      <div class="transfer-ico">${icons[t.tipo]||icons.default}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;margin-bottom:2px">${esc(t.servico)}</div>
        <div style="font-size:11px;color:var(--gold);margin-bottom:6px">${esc(t.data)} · ${esc(t.horario)} — ${esc(t.tipo)}</div>
        <div class="info-row" style="padding:4px 0"><span class="info-label">Fornecedor</span><span class="info-val">${esc(t.fornecedor)}</span></div>
        <div class="info-row" style="padding:4px 0"><span class="info-label">Motorista</span><span class="info-val">${esc(t.motorista)}</span></div>
        <div class="info-row" style="padding:4px 0"><span class="info-label">Contato</span><span class="info-val"><a href="tel:${esc(t.contato)}">${esc(t.contato)}</a></span></div>
        ${t.placa?`<div class="info-row" style="padding:4px 0"><span class="info-label">Placa</span><span class="info-val mono">${esc(t.placa)}</span></div>`:""}
        ${t.obs?`<div style="background:var(--surf2);border-radius:8px;padding:8px 10px;margin-top:6px;font-size:11px;color:var(--muted)">💡 ${esc(t.obs)}</div>`:""}

}


// ── PASSEIOS & TOURS ──
function renderPasseios(v){
  const passeios = v.passeios||[];
  const statusColors = {"confirmado":["#10b98120","#10b981"],"pendente":["#f59e0b20","#f59e0b"],"cancelado":["#ef444420","#ef4444"]};

  if(!passeios.length) return `
    <div class="sec-title">Passeios & Tours</div>
    <div style="text-align:center;padding:48px 20px;color:var(--muted)">
      <div style="font-size:44px;margin-bottom:14px">🎭</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px">Nenhum passeio cadastrado</div>
      <div style="font-size:13px">Seus tours e experiências aparecerão aqui.</div>
    </div>`;

  const cards = passeios.map(p => {
    const [sbg,sc] = statusColors[p.status]||statusColors["pendente"];
    return `
    <div style="background:var(--surf);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:42px;height:42px;border-radius:12px;background:#a78bfa20;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${p.icone||"🎭"}</div>
          <div>
            <div style="font-size:15px;font-weight:700;font-family:'Cormorant Garamond',serif;color:var(--text)">${esc(p.nome)}</div>
            <div style="font-size:11px;color:var(--gold);margin-top:2px">${esc(p.data)} · ${esc(p.horario)} · ${esc(p.duracao)}</div>
          </div>
        </div>
        <span class="badge" style="background:${sbg};color:${sc};border:1px solid ${sc}30;flex-shrink:0">${p.status||"pendente"}</span>
      </div>
      <div style="height:1px;background:var(--border);margin:10px 0"></div>
      <div class="info-row"><span class="info-label">Confirmação</span><span class="info-val mono" style="color:var(--gold)">${esc(p.confirmacao||"—")}</span></div>
      <div class="info-row"><span class="info-label">Fornecedor</span><span class="info-val">${esc(p.fornecedor||"—")}</span></div>
      ${p.guia?`<div class="info-row"><span class="info-label">Guia</span><span class="info-val">${esc(p.guia)}</span></div>`:""}
      <div class="info-row"><span class="info-label">Local</span><span class="info-val">${esc(p.local||"—")}</span></div>
      ${p.incluso?`<div style="background:#a78bfa12;border:1px solid #a78bfa25;border-radius:8px;padding:9px 12px;margin-top:8px;font-size:12px;color:#a78bfa">✦ Incluso: ${esc(p.incluso)}</div>`:""}
      ${p.obs?`<div style="background:var(--surf2);border-radius:8px;padding:9px 12px;margin-top:6px;font-size:11px;color:var(--muted)">💡 ${esc(p.obs)}</div>`:""}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">
        ${p.local?`<button onclick="openMap('${esc(p.local)}')" style="background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:9px;border-radius:9px;font-size:12px;cursor:pointer">📍 Ver local</button>`:"<div></div>"}
        ${p.contato?`<a href="tel:${esc(p.contato)}" style="display:block;text-align:center;background:linear-gradient(135deg,var(--gold),var(--goldD));color:#060C1E;padding:9px;border-radius:9px;font-size:12px;font-weight:700;text-decoration:none">📞 Ligar</a>`:"<div></div>"}
      </div>
    </div>`;
  }).join("");

  return `
  <div class="sec-title">Passeios & Tours <span style="font-size:13px;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400">${passeios.length} atividade(s)</span></div>
  ${cards}
  ${miniDocsBlock(v,["passeio","ingresso","voucher","cruzeiro"],"Anexar voucher ou ingresso")}`;
}

// ── SEGUROS ──

        <div>
          <div style="font-size:12px;font-weight:700;color:#10b981">🆘 Central 24h — ${esc(s.seguradora)}</div>

    </div>`;

  return `
  <div class="sec-title">Seguro Viagem <span style="font-size:13px;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400">${seguros.length} apólice(s)</span></div>
  <!-- Aviso de emergência -->
  <div style="background:linear-gradient(135deg,#0D1B4B,#162040);border:1px solid #10b98125;border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start">
    <div style="font-size:24px;flex-shrink:0">🚨</div>
    <div>
      <div style="font-size:13px;font-weight:700;color:var(--text)">Em caso de emergência médica</div>
      <div style="font-size:12px;color:#8899BB;margin-top:3px;line-height:1.5">Ligue imediatamente para a central 24h do seu seguro. Não pague tratamentos do próprio bolso sem autorização prévia da seguradora.</div>
    </div>
  </div>
  ${cards}
  ${miniDocsBlock(v,["seguro"],"Anexar apólice do seguro")}`;
}

// ── DOCUMENTOS ──
function renderDocs(v){
  const tipos={
    "passagem":["#3b82f6","✈️"],"hotel":["#C9A84C","🏨"],"seguro":["#10b981","🛡️"],
    "passeio":["#a78bfa","🎭"],"transfer":["#10b981","🚗"],"voucher":["#f59e0b","🎟️"],
    "ingresso":["#f97316","🎫"],"cruzeiro":["#3b82f6","🚢"],"trem":["#64748b","🚄"],
    "carro":["#10b981","🚙"],"restaurante":["#f97316","🍽️"],"outro":["#64748b","📄"]
  };

  if(!v.documentos||!v.documentos.length){
    return `<div class="sec-title">Documentos & Vouchers</div>
    <div style="text-align:center;padding:40px;color:var(--muted)">
      <div style="font-size:40px;margin-bottom:12px">📄</div>
      <div>Nenhum documento disponível ainda.</div>
    </div>`;
  }

  const grupos={};
  v.documentos.forEach(d=>{ const cat=d.tipo||"outro"; if(!grupos[cat]) grupos[cat]=[]; grupos[cat].push(d); });

  const catLabel={
    "passagem":"Passagens Aéreas","hotel":"Hotéis","seguro":"Seguro Viagem",
    "passeio":"Passeios & Tours","transfer":"Transfers","voucher":"Vouchers",
    "ingresso":"Ingressos & Tickets","cruzeiro":"Cruzeiro","trem":"Trem / Ônibus",
    "carro":"Aluguel de Carro","restaurante":"Restaurantes","outro":"Outros"
  };

  const sections = Object.entries(grupos).map(([tipo, docs])=>{
    const [col, ico] = tipos[tipo]||["#64748b","📄"];
    const cards = docs.map(d=>`
      <div class="doc-card" style="border-left:3px solid ${col}40">
        <div class="doc-ico" style="background:${col}20;font-size:20px">${d.icone||ico}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${esc(d.nome)}</div>
          ${d.obs?`<div style="font-size:11px;color:var(--muted);margin-top:2px">📎 ${esc(d.obs)}</div>`:""}
        </div>
        ${d.link&&d.link!="#"
          ? (d.link.startsWith("firestore://")
            ? `<button onclick="abrirArquivoFirestore('${d.link.replace('firestore://','')}')" style="background:linear-gradient(135deg,var(--gold),var(--goldD));color:#060C1E;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;text-decoration:none;border:none;cursor:pointer;flex-shrink:0">Abrir ↗</button>`
            : `<a href="${safeUrl(d.link)}" target="_blank" style="background:linear-gradient(135deg,var(--gold),var(--goldD));color:#060C1E;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;text-decoration:none;flex-shrink:0">Abrir ↗</a>`)
          : `<span style="font-size:11px;color:var(--muted);padding:8px">Sem link</span>`}
      </div>`).join("");
    return `<div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <span>${ico}</span>
        <span style="font-size:11px;font-weight:700;color:${col};text-transform:uppercase;letter-spacing:.5px">${catLabel[tipo]||tipo}</span>
        <span style="font-size:10px;color:var(--muted)">(${docs.length})</span>
      </div>${cards}</div>`;
  }).join("");

  return `
  <div class="sec-title">Documentos & Vouchers</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:16px">${v.documentos.length} arquivo(s) · Toque em "Abrir" para visualizar</div>
  ${sections}
  <div style="background:var(--surf);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--muted);line-height:1.5">
    💡 Para salvar um documento no celular, abra o link e use "Salvar" ou "Compartilhar" no seu navegador.
  </div>`;
}


function renderFinanceiro(v){
  const f = v.financeiro || {};

  // ── Calcular totais de todos os produtos ──
  function calcTotais(){
    const itens = [];
    const secoesMap = [
      {lista: v.voos||[],       ico:"✈️", tipo:"Voo"},
      {lista: v.hoteis||[],     ico:"🏨", tipo:"Hotel"},
      {lista: v.transfers||[],  ico:"🚗", tipo:"Transfer"},
      {lista: v.carros||[],     ico:"🚙", tipo:"Carro"},
      {lista: v.passeios||[],   ico:"🎭", tipo:"Passeio"},
      {lista: v.seguros||[],    ico:"🛡️", tipo:"Seguro"},
    ];
    secoesMap.forEach(s => {
      s.lista.forEach(item => {
        if(Number(item.valor)>0) itens.push({
          id: item.id, tipo: s.tipo, ico: s.ico,
          nome: item.nome || item.servico || item.trecho || "Item",
          valor: Number(item.valor)||0,
          pagStatus: item.pagStatus||"pendente",
        });
      });
    });
    // itens extras do financeiro
    (f.itensExtras||[]).forEach(e => itens.push({...e, ico:"💰"}));
    const total   = itens.reduce((a,b)=>a+b.valor,0);
    const pago    = itens.filter(i=>i.pagStatus==="pago").reduce((a,b)=>a+b.valor,0);
    const pendente= total - pago;
    return {itens, total, pago, pendente};
  }

  const {itens, total, pago, pendente} = calcTotais();
  const pgPct = total>0 ? Math.round((pago/total)*100) : 0;

  // ── Contatos por tipo ──
  function contatoDoTipo(tipo){
    const tipMap = {Voo:"cia", Hotel:"hotel", Transfer:"transfer", Passeio:"passeio", Seguro:"seguro"};
    return (v.contatos||[]).find(c=>c.tipo===tipMap[tipo]);
  }

  // ── Formas de pagamento ──
  const fps = f.formasPagamento||[];
  const fpIcons = {pix:"⚡",cartao:"💳",boleto:"📄"};
  const fpLabels = {pix:"PIX",cartao:"Cartão de crédito",boleto:"Boleto"};

  const itensHTML = itens.map((it,i) => {
    const isPago = it.pagStatus==="pago";
    const contato = contatoDoTipo(it.tipo);
    return `
    <div style="background:var(--surf);border-radius:12px;padding:13px 14px;margin-bottom:8px;border:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:18px;flex-shrink:0">${it.ico}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">${it.tipo}</div>
          <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(it.nome)}</div>
          ${contato?`<div style="font-size:11px;color:var(--muted);margin-top:1px">${esc(contato.nome)} · <a href="tel:${esc(contato.tel)}" style="color:var(--gold);text-decoration:none">${esc(contato.tel)}</a></div>`:""}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:16px;font-weight:700;color:${isPago?"#10b981":"var(--gold)"}">${fmtR(it.valor)}</div>
          <button onclick="togglePagStatus('${it.id}','${it.tipo}')"
            style="margin-top:4px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;border:none;cursor:pointer;
              background:${isPago?"#10b98120":"#f59e0b20"};
              color:${isPago?"#10b981":"#f59e0b"};
              border:1px solid ${isPago?"#10b98130":"#f59e0b30"}">
            ${isPago?"✓ Pago":"⏳ Pendente"}
          </button>
        </div>
      </div>
    </div>`;
  }).join("");

  const formasPagHTML = fps.length ? fps.map((fp,i)=>{
    const isPago = fp.status==="pago";
    return `
    <div style="background:var(--surf);border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;border-radius:10px;background:${isPago?"#10b98120":"#f59e0b20"};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${fpIcons[fp.tipo]||"💰"}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600">${fpLabels[fp.tipo]||fp.tipo}${fp.parcelas?` <span style="color:var(--muted);font-weight:400;font-size:11px">em ${fp.parcelas}x</span>`:""}</div>
        <div style="font-size:11px;color:var(--muted)">${fp.data||""} ${fp.obs?`· ${fp.obs}`:""}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:15px;font-weight:700;color:${isPago?"#10b981":"var(--gold)"}">${fmtR(fp.valor)}</div>
        <button onclick="toggleFpStatus(${i})"
          style="margin-top:3px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;border:none;cursor:pointer;
            background:${isPago?"#10b98120":"#f59e0b20"};color:${isPago?"#10b981":"#f59e0b"};border:1px solid ${isPago?"#10b98130":"#f59e0b30"}">
          ${isPago?"✓ Pago":"⏳ Pendente"}
        </button>
      </div>
    </div>`;
  }).join("") : `<div style="color:var(--muted);font-size:12px;padding:8px 0">Nenhuma forma de pagamento cadastrada.</div>`;

  return `
  <div class="sec-title">Financeiro</div>

  <!-- TOTALIZADOR -->
  <div class="card card-gold" style="margin-bottom:14px">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="text-align:center">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Total</div>
        <div style="font-size:22px;font-weight:700;font-family:'Cormorant Garamond',serif;color:var(--gold)">${fmtR(total)}</div>
      </div>
      <div style="text-align:center;border-left:1px solid var(--border);border-right:1px solid var(--border)">
        <div style="font-size:10px;font-weight:700;color:#10b981;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Pago</div>
        <div style="font-size:22px;font-weight:700;font-family:'Cormorant Garamond',serif;color:#10b981">${fmtR(pago)}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:10px;font-weight:700;color:${pendente>0?"#f59e0b":"#10b981"};text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Pendente</div>
        <div style="font-size:22px;font-weight:700;font-family:'Cormorant Garamond',serif;color:${pendente>0?"#f59e0b":"#10b981"}">${fmtR(pendente)}</div>
      </div>
    </div>
    <!-- Barra de progresso -->
    <div style="background:var(--surf2);border-radius:20px;height:8px;overflow:hidden;margin-bottom:8px">
      <div style="height:100%;border-radius:20px;background:linear-gradient(90deg,#10b981,#059669);width:${pgPct}%;transition:width .5s"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
      <span>${pgPct}% pago</span>
      <span>${pendente>0?fmtR(pendente)+" em aberto":"Tudo quitado ✓"}</span>
    </div>
  </div>

  <!-- ITENS POR PRODUTO -->
  <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Itens</div>
  ${itens.length ? itensHTML : `<div style="color:var(--muted);font-size:12px;padding:8px 0">Adicione valores em cada produto (voos, hotéis, transfers, passeios, seguros) para ver o detalhamento aqui.</div>`}

  <!-- FORMAS DE PAGAMENTO -->
  <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px">Pagamentos</div>
  ${formasPagHTML}
  <button onclick="openModal('novaFormaPagamento')"
    style="width:100%;background:var(--surf);border:1px dashed var(--border);border-radius:10px;padding:10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:4px">
    + Registrar pagamento
  </button>

  <!-- INCLUÍDO / NÃO INCLUÍDO -->
  ${f.incluso?.length?`
  <div class="card" style="margin-top:14px;margin-bottom:10px">
    <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:10px">✅ Incluso</div>
    ${f.incluso.map(i=>`<div class="fin-item"><div class="fin-check yes">✓</div><div style="font-size:13px">${esc(i)}</div></div>`).join("")}
  </div>`:""}
  ${f.naoIncluso?.length?`
  <div class="card">
    <div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:10px">❌ Não incluso</div>
    ${f.naoIncluso.map(i=>`<div class="fin-item"><div class="fin-check no">✕</div><div style="font-size:13px;color:var(--muted)">${esc(i)}</div></div>`).join("")}
  </div>`:""}
  ${f.obs?`<div style="font-size:11px;color:var(--muted);padding:10px 0">📝 ${esc(f.obs)}</div>`:""}`;
}

function setAdminTab(t){ adminTab=t; render(); }

// ── helpers de render de lista admin ──
function adminList(items, renderFn, btnLabel, modalName){
  return (items&&items.length
    ? items.map(renderFn).join("")
    : `<div style="color:var(--muted);text-align:center;padding:24px 0">Nenhum item cadastrado.</div>`)
    + `<div style="margin-top:14px"><button class="btn-gold" onclick="openModal('${modalName}')">${btnLabel}</button></div>`;
}
function admRow(left, btns){
  return `<div class="admin-row">${left}<div style="display:flex;gap:6px;flex-shrink:0">${btns}</div></div>`;
}
function btnEdit(fn){ return `<button class="btn-ghost btn-sm" onclick="${fn}">✏️</button>`; }
function btnDel(fn){ return `<button class="btn-danger" onclick="${fn}">✕</button>`; }

function renderAdminViagens(){
  const selId=session.viagemSel;
  return adminList(store.viagens,
    v=>{
      const sel=v.id===selId;
      return admRow(
        `<div style="flex:1;cursor:pointer" onclick="selViagem('${v.id}')">
          <div style="font-size:13px;font-weight:600">${esc(v.titulo)}${sel?' <span style="color:var(--gold);font-size:10px">● ativa</span>':""}</div>
          <div style="font-size:11px;color:var(--muted)">${esc(v.destino)} · ${v.inicio} → ${v.fim}</div>
          <span class="badge" style="background:#10b98120;color:#10b981;border:1px solid #10b98130;margin-top:4px">${v.status}</span>
        </div>`,
        btnEdit(`editViagem('${v.id}')`) +
        `<button class="btn-ghost btn-sm" onclick="previewViagem('${v.id}')">👁</button>` +
        btnDel(`delViagem('${v.id}')`)
      );
    },
    "+ Nova Viagem","novaViagem"
  );
}

function renderCarros(v){
  const carros = v.carros||[];
  const statusColors = {"confirmado":["#10b98120","#10b981"],"pendente":["#f59e0b20","#f59e0b"],"cancelado":["#ef444420","#ef4444"]};

  if(!carros.length) return `
    <div class="sec-title">Aluguel de Carro</div>
    <div style="text-align:center;padding:48px 20px;color:var(--muted)">
      <div style="font-size:44px;margin-bottom:14px">🚙</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px">Nenhum aluguel cadastrado</div>
      <div style="font-size:13px">Seus aluguéis de carro aparecerão aqui.</div>
    </div>`;

  const cards = carros.map(c => {
    const [sbg,sc] = statusColors[c.status]||statusColors["pendente"];
    const contato = (v.contatos||[]).find(ct=>ct.tipo==="carro");
    return `
    <div style="background:var(--surf);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)">
      <!-- Header -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:44px;height:44px;border-radius:12px;background:#3b82f620;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">${c.icone||"🚙"}</div>
          <div>
            <div style="font-size:15px;font-weight:700;font-family:'Cormorant Garamond',serif">${esc(c.modelo||c.categoria||"Carro")}</div>
            <div style="font-size:11px;color:var(--gold);margin-top:2px">${esc(c.locadora||"")}${c.categoria?" · "+esc(c.categoria):""}</div>
          </div>
        </div>
        <div style="text-align:right">
          <span class="badge" style="background:${sbg};color:${sc};border:1px solid ${sc}30">${c.status||"pendente"}</span>
          ${Number(c.valor)>0?`<div style="font-size:14px;font-weight:700;color:${c.pagStatus==='pago'?'#10b981':'var(--gold)'};margin-top:3px">${fmtR(c.valor)}</div>`:""}
        </div>
      </div>
      <div style="height:1px;background:var(--border);margin:10px 0"></div>

      <!-- Datas -->
      <div class="info-row"><span class="info-label">Retirada</span><span class="info-val" style="color:var(--green)">${esc(c.retirada||"—")}</span></div>
      <div class="info-row"><span class="info-label">Devolução</span><span class="info-val" style="color:var(--red)">${esc(c.devolucao||"—")}</span></div>
      ${c.dias?`<div class="info-row"><span class="info-label">Diárias</span><span class="info-val">${esc(c.dias)} dia(s)</span></div>`:""}
      <div class="info-row"><span class="info-label">Reserva</span><span class="info-val mono" style="color:var(--gold)">${esc(c.reserva||"—")}</span></div>
      ${c.localRetirada?`<div class="info-row"><span class="info-label">Local retirada</span><span class="info-val">${esc(c.localRetirada)}</span></div>`:""}
      ${c.localDevolucao&&c.localDevolucao!==c.localRetirada?`<div class="info-row"><span class="info-label">Local devolução</span><span class="info-val">${esc(c.localDevolucao)}</span></div>`:""}

      <!-- Detalhes técnicos -->
      ${(c.transmissao||c.combustivel||c.capacidade||c.placa)?`
      <div style="background:var(--card);border-radius:10px;padding:10px 12px;margin-top:10px;display:flex;flex-wrap:wrap;gap:8px">
        ${c.transmissao?`<div style="font-size:11px;background:var(--surf2);padding:3px 9px;border-radius:20px;color:var(--muted)">⚙️ ${esc(c.transmissao)}</div>`:""}
        ${c.combustivel?`<div style="font-size:11px;background:var(--surf2);padding:3px 9px;border-radius:20px;color:var(--muted)">⛽ ${esc(c.combustivel)}</div>`:""}
        ${c.capacidade?`<div style="font-size:11px;background:var(--surf2);padding:3px 9px;border-radius:20px;color:var(--muted)">👥 ${esc(c.capacidade)} pessoas</div>`:""}
        ${c.placa?`<div style="font-size:11px;background:var(--surf2);padding:3px 9px;border-radius:20px;color:var(--muted) font-family:'JetBrains Mono',monospace">🔢 ${esc(c.placa)}</div>`:""}
      </div>`:""}

      <!-- Inclusões -->
      ${c.incluso?`<div style="background:#3b82f612;border:1px solid #3b82f625;border-radius:8px;padding:9px 12px;margin-top:8px;font-size:11px;color:#3b82f6">✦ Incluso: ${esc(c.incluso)}</div>`:""}

      <!-- Contato da locadora + contato geral da aba -->
      ${c.telefone||contato?`
      <div style="margin-top:12px;background:linear-gradient(135deg,#0D1B4B,#162040);border:1px solid #3b82f625;border-radius:10px;padding:11px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px">

          ${(c.telefone||contato?.tel)?`<a href="tel:${esc(c.telefone||contato?.tel||"")}" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">📞 Ligar</a>`:""}

        </div>
      </div>`:""}

      <!-- Mapa retirada -->
      ${c.localRetirada?`
      <button onclick="openMap('${esc(c.localRetirada)}')"
        style="width:100%;margin-top:8px;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:9px;border-radius:9px;font-size:12px;cursor:pointer">
        📍 Ver local de retirada no mapa
      </button>`:""}
    </div>`;
  }).join("");

  return `
  <div class="sec-title">Aluguel de Carro <span style="font-size:13px;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400">${carros.length} reserva(s)</span></div>
  ${cards}
  ${miniDocsBlock(v,["carro"],"Anexar voucher do aluguel")}`;
}

function deleteCarro(i){
  if(!confirm("Remover este aluguel?")) return;
  const v=getViagem(); if(!v) return;
  if(!v.carros) return;
  v.carros.splice(i,1); saveStore(); render();
}

function renderAdminFinanceiro(){

  // calcular itens com valor

  const itensRows=itens.length?itens.map(it=>`

        <button onclick="togglePagStatus('${it.id}','${it.tipo}')"
          style="font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;border:none;cursor:pointer;

            color:${it.pagStatus==="pago"?"#10b981":"#f59e0b"}">
          ${it.pagStatus==="pago"?"✓ Pago":"⏳ Pendente"}
        </button>
      </div>
    </div>`).join(""):
    `<div style="color:var(--muted);font-size:12px;padding:8px">Adicione valores nos produtos para ver o resumo.</div>`;

  const fps=f.formasPagamento||[];
  const fpIcons={pix:"⚡",cartao:"💳",boleto:"📄"};

  return `<div style="font-size:11px;color:var(--gold);margin-bottom:10px">Viagem: ${esc(v.titulo)}</div>

  <div class="admin-row" style="background:linear-gradient(135deg,#0D1B4B,#162040);border-color:#C9A84C30">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;text-align:center">
      <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Total</div><div style="font-size:20px;font-weight:700;font-family:'Cormorant Garamond',serif;color:var(--gold)">${fmtR(total)}</div></div>
      <div style="border-left:1px solid var(--border);border-right:1px solid var(--border)"><div style="font-size:10px;color:#10b981;text-transform:uppercase">Pago</div><div style="font-size:20px;font-weight:700;font-family:'Cormorant Garamond',serif;color:#10b981">${fmtR(pago)}</div></div>
      <div><div style="font-size:10px;color:${pendente>0?"#f59e0b":"#10b981"};text-transform:uppercase">Pendente</div><div style="font-size:20px;font-weight:700;font-family:'Cormorant Garamond',serif;color:${pendente>0?"#f59e0b":"#10b981"}">${fmtR(pendente)}</div></div>
    </div>
  </div>

  <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px">Itens</div>
  ${itensRows}

  <div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 6px">
    <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Pagamentos (${fps.length})</div>

  ${fps.length?fps.map((fp,i)=>`

      <span style="font-size:18px">${fpIcons[fp.tipo]||"💰"}</span>
      <div style="flex:1"><div style="font-size:12px;font-weight:600">${fp.tipo==="pix"?"PIX":fp.tipo==="cartao"?"Cartão "+( fp.parcelas>1?fp.parcelas+"x":"à vista"):"Boleto"}</div><div style="font-size:10px;color:var(--muted)">${fp.data||""} ${fp.obs?`· ${fp.obs}`:""}</div></div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:14px;font-weight:700;color:${fp.status==="pago"?"#10b981":"var(--gold)"}">${fmtR(fp.valor)}</span>
        <button onclick="toggleFpStatus(${i})" style="font-size:10px;padding:3px 9px;border-radius:20px;border:none;cursor:pointer;background:${fp.status==="pago"?"#10b98120":"#f59e0b20"};color:${fp.status==="pago"?"#10b981":"#f59e0b"}">${fp.status==="pago"?"✓ Pago":"⏳ Pendente"}</button>
        <button onclick="delFp(${i})" class="btn-danger btn-sm" style="padding:3px 8px">🗑</button>

  <div style="margin-top:14px;display:flex;gap:8px">

function openModal(name, data){
  modalState=name; modalData=data||{}; render();
}

async function saveModal(){
  const g=id=>document.getElementById(id)?.value?.trim()||"";
  const m=modalState;
  const v=getViagem();

  // Passeio

  if(m==="novoCarro"||m==="editCarro"){
    const reserva=g("m-reserva"), retirada=g("m-retirada"), locadora=g("m-locadora");
    if(!reserva||!retirada||!locadora){ showErr("Preencha locadora, reserva e retirada."); return; }
    const obj={
      id:m==="editCarro"?(d.c?.id||"C"+Date.now()):"C"+Date.now(),
      icone:g("m-icone")||"🚙",
      locadora, modelo:g("m-modelo"), categoria:g("m-categoria"),
      reserva, status:document.getElementById("m-status")?.value||"confirmado",
      retirada, devolucao:g("m-devolucao"),
      dias:g("m-dias"), capacidade:g("m-capacidade"),
      localRetirada:g("m-localRetirada"), localDevolucao:g("m-localDevolucao"),
      transmissao:g("m-transmissao"), combustivel:g("m-combustivel"),
      placa:g("m-placa"), telefone:g("m-telefone"),
      incluso:g("m-incluso"), obs:g("m-obs"),
      valor:parseFloat(g("m-valor").replace(",","."))||0,
      pagStatus:document.getElementById("m-pagStatus")?.value||"pendente",
    };
    if(!v.carros) v.carros=[];
    if(m==="editCarro"&&d.i!==undefined) v.carros[d.i]=obj;
    else v.carros.push(obj);
    // Auto-add contato da locadora
    if(obj.telefone && !(v.contatos||[]).find(c=>c.tel===obj.telefone)){
      if(!v.contatos) v.contatos=[];
      v.contatos.push({nome:obj.locadora,cargo:"Locadora de veículos · "+obj.categoria,tel:obj.telefone,wa:null,tipo:"carro",icone:"🚙"});
    }
    saveStore(); closeModal(); return;
  }

  if(m==="novoPasseio"||m==="editPasseio"){
    const nome=document.getElementById("m-nome")?.value?.trim();
    if(!nome){ showErr("Nome é obrigatório."); return; }
    const obj={
      id:m==="editPasseio"?(d.p?.id||"P"+Date.now()):"P"+Date.now(),
      icone:document.getElementById("m-icone")?.value||"🎭",
      valor:parseFloat(document.getElementById("m-valor")?.value||0)||0,
      pagStatus:document.getElementById("m-pagStatus2")?.value||"pendente",
      nome, data:document.getElementById("m-data")?.value||"",
      horario:document.getElementById("m-horario")?.value||"",
      duracao:document.getElementById("m-duracao")?.value||"",
      confirmacao:document.getElementById("m-confirmacao")?.value||"",
      status:document.getElementById("m-status")?.value||"confirmado",
      fornecedor:document.getElementById("m-fornecedor")?.value||"",
      guia:document.getElementById("m-guia")?.value||"",
      contato:document.getElementById("m-contato")?.value||"",
      local:document.getElementById("m-local")?.value||"",
      incluso:document.getElementById("m-incluso")?.value||"",
      obs:document.getElementById("m-obs")?.value||"",
    };
    if(!v.passeios) v.passeios=[];
    if(m==="editPasseio"&&d.i!==undefined) v.passeios[d.i]=obj;
    else v.passeios.push(obj);
    saveStore(); closeModal(); return;
  }

  // Seguro
  if(m==="novoSeguro"||m==="editSeguro"){
    const nome=document.getElementById("m-nome")?.value?.trim();
    if(!nome){ showErr("Nome é obrigatório."); return; }
    const obj={
      id:m==="editSeguro"?(d.s?.id||"S"+Date.now()):"S"+Date.now(),
      icone:document.getElementById("m-icone")?.value||"🛡️",
      valor:parseFloat(document.getElementById("m-valor")?.value||0)||0,
      pagStatus:document.getElementById("m-pagStatus2")?.value||"pendente",
      status:document.getElementById("m-status")?.value||"ativo",
      nome, seguradora:document.getElementById("m-seguradora")?.value||"",
      apolice:document.getElementById("m-apolice")?.value||"",
      validade:document.getElementById("m-validade")?.value||"",
      coberturaMedica:document.getElementById("m-coberturaMedica")?.value||"",
      coberturaBagagem:document.getElementById("m-coberturaBagagem")?.value||"",
      coberturaVoo:document.getElementById("m-coberturaVoo")?.value||"",
      assistencia24h:document.getElementById("m-assistencia24h")?.value||"",
      centralMundial:document.getElementById("m-centralMundial")?.value||"",
      app:document.getElementById("m-app")?.value||"",
      obs:document.getElementById("m-obs")?.value||"",
    };
    if(!v.seguros) v.seguros=[];
    if(m==="editSeguro"&&d.i!==undefined) v.seguros[d.i]=obj;
    else v.seguros.push(obj);
    saveStore(); closeModal(); return;
  }


  function showErr(msg){
    const el=document.getElementById("m-err");
    if(el){ el.textContent=msg; el.classList.remove("hidden"); }
  }

  // ── CLIENTE ──
  if(m==="novoCliente"||m==="editCliente"){
    const nome=g("m-nome"),email=g("m-email"),senha=g("m-senha");
    if(!nome||!email||!senha){ showErr("Preencha nome, e-mail e senha."); return; }
    if(m==="novoCliente"){
      if(store.clientes.find(c=>c.email.toLowerCase()===email.toLowerCase())){ showErr("E-mail já cadastrado."); return; }
      const senhaHash = await hashSenha(senha);
      store.clientes.push({id:"C"+Date.now(),nome,email,senha:senhaHash,tel:g("m-tel")});
    } else {
      const c=store.clientes.find(c=>c.id===modalData.id);
      if(c){ c.nome=nome; c.email=email; c.senha=await hashSenha(senha); c.tel=g("m-tel"); }
    }
    saveStore(); closeModal(); return;
  }

  // ── VIAGEM ──
  if(m==="novaViagem"||m==="editViagem"){
    const titulo=g("m-titulo"),destino=g("m-destino"),inicio=g("m-inicio"),fim=g("m-fim");
    if(!titulo||!destino||!inicio||!fim){ showErr("Preencha título, destino e datas."); return; }
    if(m==="novaViagem"){
      const clienteId=g("m-clienteId");
      if(!clienteId){ showErr("Selecione um cliente."); return; }
      const id="V"+Date.now();
      const nova={id,clienteId,titulo,destino,pais:g("m-pais"),inicio,fim,
        status:g("m-status")||"confirmada",resumo:g("m-resumo"),agente:g("m-agente"),
        agenteWa:g("m-wa"),emergencia:g("m-wa"),horarioAtendimento:g("m-horario")||"Seg–Sex 9h–19h · Emergências 24h",
        suporteEmail:g("m-email"),
        roteiro:[],voos:[],hoteis:[],transfers:[],documentos:[],contatos:[],
        financeiro:{totalPago:0,status:"pendente",incluso:[],naoIncluso:[],obs:""}};
      store.viagens.push(nova); session.viagemSel=id;
    } else if(v){
      v.titulo=titulo||v.titulo; v.destino=destino||v.destino;
      v.pais=g("m-pais")||v.pais; v.inicio=inicio||v.inicio; v.fim=fim||v.fim;
      v.status=g("m-status")||v.status; v.resumo=g("m-resumo")||v.resumo;
      v.agente=g("m-agente"); v.agenteWa=g("m-wa"); v.emergencia=g("m-wa");
      v.horarioAtendimento=g("m-horario"); v.suporteEmail=g("m-email");
    }
    saveStore(); closeModal(); return;
  }

  // ── ROTEIRO ──
  if(m==="novoRoteiro"||m==="editRoteiro"){
    const titulo=g("m-titulo"),dia=g("m-dia"),horario=g("m-horario");
    if(!titulo||!dia||!horario){ showErr("Preencha dia, horário e título."); return; }
    const item={dia,horario,titulo,desc:g("m-desc"),tipo:g("m-tipo")||"passeio",local:g("m-local")};
    if(m==="novoRoteiro") v.roteiro.push(item);
    else { const idx=modalData.idx; if(idx>=0) v.roteiro[idx]=item; }
    v.roteiro.sort((a,b)=>a.dia.localeCompare(b.dia)||a.horario.localeCompare(b.horario));
    saveStore(); closeModal(); return;
  }

  // ── VOO ──
  if(m==="novoVoo"||m==="editVoo"){
    const trecho=g("m-trecho"),numero=g("m-numero"),saida=g("m-saida");
    if(!trecho||!numero||!saida){ showErr("Preencha trecho, número e saída."); return; }
    if(trecho.length>50||numero.length>20){ showErr("Campos excedem tamanho máximo."); return; }
    const item={id:"F"+Date.now(),
      valor:parseFloat(g("m-valor").replace(",","."))||0,
      pagStatus:document.getElementById("m-pagStatus")?.value||"pendente",
      trecho,cia:g("m-cia"),numero,saida,chegada:g("m-chegada"),
      localizador:g("m-loc"),terminal:g("m-terminal"),bagagem:g("m-bagagem"),
      checkIn:g("m-checkin")||"#",nota:g("m-nota"),status:"confirmado"};
    if(m==="novoVoo") v.voos.push(item);
    else { const idx=modalData.idx; if(idx>=0) v.voos[idx]={...v.voos[idx],...item}; }
    saveStore(); closeModal(); return;
  }

  // ── HOTEL ──
  if(m==="novoHotel"||m==="editHotel"){
    const nome=g("m-nome"),checkin=g("m-checkin");
    if(!nome||!checkin){ showErr("Preencha nome e check-in."); return; }
    const item={id:"H"+Date.now(),
      valor:parseFloat(g("m-valor").replace(",","."))||0,
      pagStatus:document.getElementById("m-pagStatus")?.value||"pendente",
      nome,estrelas:Number(g("m-estrelas"))||4,
      cidade:g("m-cidade"),endereco:g("m-endereco"),checkin,checkout:g("m-checkout"),
      confirmacao:g("m-confirmacao"),telefone:g("m-telefone"),mapa:g("m-mapa")||"#",
      regras:g("m-regras"),nota:g("m-nota")};
    if(m==="novoHotel") v.hoteis.push(item);
    else { const idx=modalData.idx; if(idx>=0) v.hoteis[idx]={...v.hoteis[idx],...item}; }
    saveStore(); closeModal(); return;
  }

  // ── TRANSFER ──
  if(m==="novoTransfer"||m==="editTransfer"){
    const servico=g("m-servico"),horario=g("m-horario");
    if(!servico||!horario){ showErr("Preencha serviço e horário."); return; }
    const item={id:"T"+Date.now(),
      valor:parseFloat(g("m-valor").replace(",","."))||0,
      pagStatus:document.getElementById("m-pagStatus")?.value||"pendente",
      data:g("m-data"),horario,tipo:g("m-tipo")||"Carro Executivo",
      servico,fornecedor:g("m-fornecedor"),motorista:g("m-motorista"),
      contato:g("m-contato"),placa:g("m-placa"),obs:g("m-obs")};
    if(!v.transfers) v.transfers=[];
    if(m==="novoTransfer") v.transfers.push(item);
    else { const idx=modalData.idx; if(idx>=0) v.transfers[idx]={...v.transfers[idx],...item}; }
    saveStore(); closeModal(); return;
  }

  // ── DOCUMENTO ──
  if(m==="novoDoc"||m==="editDoc"){
    const nome=g("m-nome");
    if(!nome){ showErr("Preencha o nome do documento."); return; }
    // Desabilitar botão durante upload
    const okBtn=document.querySelector('[onclick="saveModal()"]');
    if(okBtn){ okBtn.disabled=true; okBtn.textContent="Salvando..."; }
    // Fazer upload do arquivo se selecionado
    let link=g("m-link");
    if(_docFileSelected){
      const uploadedUrl=await fazerUploadDoc();
      if(uploadedUrl) link=uploadedUrl;
    }
    if(!link){ 
      showErr("Selecione um arquivo ou cole um link.");
      if(okBtn){ okBtn.disabled=false; okBtn.textContent="Salvar"; }
      return;
    }
    const item={id:"D"+Date.now(),nome,tipo:g("m-tipo")||"outro",icone:g("m-icone")||"📄",link,obs:g("m-obs")};
    if(!v.documentos) v.documentos=[];
    if(m==="novoDoc") v.documentos.push(item);
    else { const idx=modalData.idx; if(idx>=0) v.documentos[idx]={...v.documentos[idx],...item}; }
    saveStore(); closeModal(); return;
  }

  // ── CONTATO ──
  if(m==="novoContato"||m==="editContato"){
    const nome=g("m-nome"),tel=g("m-tel");
    if(!nome||!tel){ showErr("Preencha nome e telefone."); return; }
    const item={nome,cargo:g("m-cargo"),tel,wa:g("m-wa")||null,tipo:g("m-tipo")||"hotel",icone:g("m-icone")||"📞"};
    if(!v.contatos) v.contatos=[];
    if(m==="novoContato") v.contatos.push(item);
    else { const idx=modalData.idx; if(idx>=0) v.contatos[idx]={...v.contatos[idx],...item}; }
    saveStore(); closeModal(); return;
  }

  // ── FINANCEIRO ──

  if(m==="novaFormaPagamento"){
    const tipo=document.getElementById("m-fpTipo")?.value||"pix";
    const valor=parseFloat(document.getElementById("m-fpValor")?.value?.replace(",",".")||"0")||0;
    if(!valor){ showErr("Informe o valor."); return; }
    const parcelas=tipo==="cartao"?Number(document.getElementById("m-fpParcelas")?.value||1):undefined;
    const fp={
      tipo, valor,
      parcelas: parcelas&&parcelas>1?parcelas:undefined,
      data:document.getElementById("m-fpData")?.value||"",
      obs:document.getElementById("m-fpObs")?.value||"",
      status:document.getElementById("m-fpStatus")?.value||"pago",
    };
    if(!v.financeiro) v.financeiro={};
    if(!v.financeiro.formasPagamento) v.financeiro.formasPagamento=[];
    v.financeiro.formasPagamento.push(fp);
    saveStore(); closeModal(); return;
  }

  if(m==="editFinanceiro" && v){
    if(!v.financeiro) v.financeiro={};
    v.financeiro.totalPago=parseFloat(g("m-total").replace(",","."))||0;
    v.financeiro.status=g("m-status")||"pendente";
    v.financeiro.incluso=(document.getElementById("m-incluso")?.value||"").split("\n").map(s=>s.trim()).filter(Boolean);
    v.financeiro.naoIncluso=(document.getElementById("m-naoincluso")?.value||"").split("\n").map(s=>s.trim()).filter(Boolean);
    v.financeiro.obs=g("m-obs");
    saveStore(); closeModal(); return;
  }
}
