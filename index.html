// ── Parser do formato estruturado gerado pelo formulário Vetur ────────────
function parseFormularioVetur(txt){
  const lines = txt.split("\n");
  const g = (block, key) => {
    for(const l of block){
      const m = l.match(/^([^:]+):\s*(.+)$/);
      if(m && m[1].trim().toLowerCase() === key.toLowerCase()) return m[2].trim();
    }
    return "";
  };

  // Dividir em seções
  const sections = {};
  let current = null, currentLines = [];
  for(const line of lines){
    const sec = line.match(/^===\s*(.+?)\s*===$/);
    if(sec){
      if(current) sections[current] = (sections[current]||[]).concat([currentLines]);
      current = sec[1].trim();
      currentLines = [];
    } else if(current){
      if(line.trim()) currentLines.push(line);
    }
  }
  if(current) sections[current] = (sections[current]||[]).concat([currentLines]);

  const result = {tipo:"voucher", nome:"", icone:"✈️", obs:""};

  // VIAGEM
  const viagem = sections["VIAGEM"]?.[0] || [];
  result.nome = g(viagem,"Título") || g(viagem,"Titulo") || "Viagem";
  result._titulo = g(viagem,"Título") || g(viagem,"Titulo");
  result._destino = g(viagem,"Destino");
  result._inicio = g(viagem,"Início") || g(viagem,"Inicio");
  result._fim = g(viagem,"Fim");
  result._resumo = g(viagem,"Resumo");
  result._cliente = g(viagem,"Cliente");
  result._agente = g(viagem,"Agente");
  result._agenteWa = g(viagem,"WhatsApp do agente");

  // VOOS — pegar o primeiro como voo principal no preview
  const vooKeys = Object.keys(sections).filter(k => k.match(/^VOO\s*\d*/i));
  if(vooKeys.length > 0){
    const v1 = sections[vooKeys[0]][0] || [];
    result.voo = {
      trecho: g(v1,"Trecho"),
      cia: g(v1,"Companhia"),
      numero: g(v1,"Número do voo") || g(v1,"Numero do voo"),
      saida: g(v1,"Saída") || g(v1,"Saida"),
      chegada: g(v1,"Chegada"),
      localizador: g(v1,"Localizador"),
      terminal: g(v1,"Terminal") || g(v1,"Terminal/Portão"),
      bagagem: g(v1,"Bagagem") || g(v1,"Franquia de bagagem"),
      passageiros: g(v1,"Passageiros"),
      assento: g(v1,"Assento(s)") || g(v1,"Assento"),
      checkIn: g(v1,"Link check-in") || "",
      nota: g(v1,"Observações") || "",
      valor: (g(v1,"Valor")||"0").replace(/[R$\s]/g,"") || "0",
    };
    // Guardar voos extras para aplicar diretamente
    result._voos_extras = vooKeys.slice(1).map(k => {
      const vx = sections[k][0] || [];
      return {
        trecho: g(vx,"Trecho"), cia: g(vx,"Companhia"),
        numero: g(vx,"Número do voo")||g(vx,"Numero do voo"),
        saida: g(vx,"Saída")||g(vx,"Saida"), chegada: g(vx,"Chegada"),
        localizador: g(vx,"Localizador"), terminal: g(vx,"Terminal")||"",
        bagagem: g(vx,"Bagagem")||"", passageiros: g(vx,"Passageiros")||"",
        assento: g(vx,"Assento(s)")||"", checkIn: g(vx,"Link check-in")||"",
        nota: g(vx,"Observações")||"", valor: (g(vx,"Valor")||"0").replace(/[R$\s]/g,"")||"0",
      };
    });
  }

  // HOTÉIS — primeiro no preview, extras guardados
  const hotelKeys = Object.keys(sections).filter(k => k.match(/^HOTEL\s*\d*/i));
  if(hotelKeys.length > 0){
    const h1 = sections[hotelKeys[0]][0] || [];
    result.hotel = {
      nome: g(h1,"Nome"), estrelas: parseInt(g(h1,"Estrelas"))||4,
      cidade: g(h1,"Cidade"), pais: g(h1,"País")||g(h1,"Pais"),
      endereco: g(h1,"Endereço")||g(h1,"Endereco"),
      checkin: g(h1,"Check-in"), checkout: g(h1,"Check-out"),
      noites: parseInt(g(h1,"Noites"))||1, hospedes: parseInt(g(h1,"Hóspedes")||g(h1,"Hospedes"))||2,
      confirmacao: g(h1,"Nº confirmação")||g(h1,"Confirmação")||g(h1,"Confirmacao"),
      telefone: g(h1,"Telefone"), email: g(h1,"E-mail")||g(h1,"Email"),
      nota: g(h1,"Inclusões")||g(h1,"Notas")||g(h1,"Nota"),
      valor: (g(h1,"Valor")||"0").replace(/[R$\s]/g,"")||"0",
    };
    result._hoteis_extras = hotelKeys.slice(1).map(k => {
      const hx = sections[k][0] || [];
      return {
        nome:g(hx,"Nome"), estrelas:parseInt(g(hx,"Estrelas"))||4,
        cidade:g(hx,"Cidade"), pais:g(hx,"País")||g(hx,"Pais"),
        endereco:g(hx,"Endereço")||g(hx,"Endereco"),
        checkin:g(hx,"Check-in"), checkout:g(hx,"Check-out"),
        noites:parseInt(g(hx,"Noites"))||1, hospedes:parseInt(g(hx,"Hóspedes")||g(hx,"Hospedes"))||2,
        confirmacao:g(hx,"Nº confirmação")||g(hx,"Confirmação")||"",
        telefone:g(hx,"Telefone"), nota:g(hx,"Inclusões")||"",
        valor:(g(hx,"Valor")||"0").replace(/[R$\s]/g,"")||"0",
      };
    });
  }

  // TRANSFERS
  const trKeys = Object.keys(sections).filter(k => k.match(/^TRANSFER\S*/i));
  if(trKeys.length > 0){
    const t1 = sections[trKeys[0]][0] || [];
    result.transfer = {
      servico:g(t1,"Serviço")||g(t1,"Servico"), data:g(t1,"Data"),
      horario:g(t1,"Horário")||g(t1,"Horario"), tipo:g(t1,"Tipo"),
      fornecedor:g(t1,"Fornecedor"), motorista:g(t1,"Motorista"),
      contato:g(t1,"Contato"), placa:g(t1,"Placa"),
      obs:g(t1,"Observações")||"", valor:(g(t1,"Valor")||"0").replace(/[R$\s]/g,"")||"0",
    };
    if(!result.transfer.servico) delete result.transfer;
  }

  // SEGURO
  const segKeys = Object.keys(sections).filter(k => k.match(/^SEGURO/i));
  if(segKeys.length > 0){
    const s1 = sections[segKeys[0]][0] || [];
    result.seguro = {
      nome:g(s1,"Produto")||g(s1,"Nome"), seguradora:g(s1,"Seguradora"),
      apolice:g(s1,"Apólice")||g(s1,"Apolice"), validade:g(s1,"Validade"),
      coberturaMedica:g(s1,"Cobertura médica")||g(s1,"Cobertura medica"),
      coberturaBagagem:g(s1,"Cobertura bagagem"), coberturaVoo:g(s1,"Cobertura voo")||"",
      assistencia24h:g(s1,"Central 24h Brasil")||g(s1,"Central 24h")||"",
      centralMundial:g(s1,"Central Internacional")||"",
      app:g(s1,"Aplicativo")||"", obs:g(s1,"Observações")||"",
      valor:(g(s1,"Valor")||"0").replace(/[R$\s]/g,"")||"0",
    };
    if(!result.seguro.nome && !result.seguro.seguradora) delete result.seguro;
  }

  // CARRO
  const carKeys = Object.keys(sections).filter(k => k.match(/^ALUGUEL DE CARRO|^CARRO/i));
  if(carKeys.length > 0){
    const c1 = sections[carKeys[0]][0] || [];
    result.carro = {
      locadora:g(c1,"Locadora"), reserva:g(c1,"Reserva"),
      modelo:g(c1,"Modelo"), categoria:g(c1,"Categoria"),
      retirada:g(c1,"Retirada"), devolucao:g(c1,"Devolução")||g(c1,"Devolucao"),
      dias:g(c1,"Diárias")||g(c1,"Diarias"), capacidade:g(c1,"Capacidade")||"",
      localRetirada:g(c1,"Local de retirada")||"",
      transmissao:g(c1,"Transmissão")||g(c1,"Transmissao"),
      combustivel:g(c1,"Combustível")||g(c1,"Combustivel"),
      telefone:g(c1,"Telefone"), incluso:g(c1,"Incluso")||"",
      valor:(g(c1,"Valor")||"0").replace(/[R$\s]/g,"")||"0",
    };
    if(!result.carro.locadora) delete result.carro;
  }

  // FINANCEIRO
  const finKeys = Object.keys(sections).filter(k => k.match(/^FINANCEIRO/i));
  if(finKeys.length > 0){
    const f1 = sections[finKeys[0]][0] || [];
    result._financeiro = {
      total:(g(f1,"Valor total do pacote")||"0").replace(/[R$\s]/g,""),
      obs:g(f1,"Observações")||g(f1,"Observacoes")||"",
      incluso: f1.filter(l=>l.startsWith("- ")||l.startsWith("• ")).map(l=>l.replace(/^[-•]\s*/,""))
    };
  }

  // CONTATOS
  const contKeys = Object.keys(sections).filter(k => k.match(/^CONTATO/i));
  if(contKeys.length > 0){
    result.contatos = contKeys.map(k => {
      const c = sections[k][0] || [];
      return {
        nome:g(c,"Nome"), cargo:g(c,"Cargo")||"",
        tel:g(c,"Telefone"), wa:g(c,"WhatsApp")||"",
        tipo:g(c,"Tipo")||"outro", icone:"📞"
      };
    }).filter(c=>c.nome||c.tel);
  }

  return result;
}

          onmouseover="this.style.borderColor='#C9A84C40'" onmouseout="this.style.borderColor=''">
          <span style="font-size:20px">${ico}</span>
          <span style="font-size:12px;font-weight:600;color:var(--text)">${lbl}</span>
        </button>`).join("")}
    </div>
  </div>`;

  return uploadSection + previewSection + manualSection;
}

// ── Handle file drop / select ─────────────────────────────────────────────
function importHandleFile(file){
  if(!file) return;

  // ── Import JSON exported from formulário ─────────────────────────
  if(file.name && file.name.endsWith(".json")){
    const reader = new FileReader();
    reader.onload = e => {
      try{
        const dados = JSON.parse(e.target.result);
        // Map formulario structure to viagem structure
        const v = getViagem();
        if(!v) return;
        if(dados.titulo)     v.titulo      = dados.titulo;
        if(dados.destino)    v.destino     = dados.destino;
        if(dados.inicio)     v.inicio      = dados.inicio;
        if(dados.fim)        v.fim         = dados.fim;
        if(dados.resumo)     v.resumo      = dados.resumo;
        if(dados.clienteNome) v.clienteNome = dados.clienteNome;
        if(dados.agenteNome) v.agenteNome  = dados.agenteNome;
        // Merge arrays
        ["voos","hoteis","transfers","carros","passeios","seguros","contatos","roteiro"].forEach(k=>{
          if(dados[k]&&dados[k].length){
            if(!v[k]) v[k]=[];
            dados[k].forEach(item=>{ item.id=k[0].toUpperCase()+Date.now()+Math.random().toString(36).slice(2,5); v[k].push(item); });
          }
        });
        if(dados.financeiro){
          if(!v.financeiro) v.financeiro={};
          if(dados.financeiro.total>0) v.financeiro.total = dados.financeiro.total;
          if(dados.financeiro.obs) v.financeiro.obs = dados.financeiro.obs;
          if(dados.financeiro.incluso&&dados.financeiro.incluso.length) v.financeiro.incluso = dados.financeiro.incluso;
        }
        saveStore();
        _importState = {arquivo:null,preview:null,loading:false,erro:"",aplicado:true};
        render();
      }catch(err){
        _importState.erro = "Erro ao importar JSON: "+err.message;
        render();
      }
    };
    reader.readAsText(file);
    return;
  }
  _importState = {arquivo:file, preview:null, loading:false, erro:"", aplicado:false};
  render();
}

// ── Extract with IA ───────────────────────────────────────────────────────
async function importExtrairIA(){
  const file = _importState.arquivo;
  if(!file) return;
  const apiKey = (store.apiKey||"").trim();
  if(!apiKey){
    _importState.erro = "Configure a chave Gemini em ⚙ Config para usar a IA.";
    render(); return;
  }
  _importState.loading = true;
  _importState.erro = "";
  render();
  try{
    const dados = await lerPDFcomIACompleto(file);
    _importState.preview = dados;
    _importState.loading = false;
    render();
  }catch(e){
    _importState.loading = false;
    _importState.erro = e.message;
    render();
  }
}

        noites:hx.noites||1, hospedes:hx.hospedes||2,
        confirmacao:hx.confirmacao||"", telefone:hx.telefone||"",
        nota:hx.nota||"", valor:parseFloat(hx.valor)||0, pagStatus:"pendente"
      });
    });
  }

  // DADOS DA VIAGEM (do parser do formulário Vetur)
  if(p._titulo && !v.titulo) v.titulo = p._titulo;
  if(p._destino && !v.destino) v.destino = p._destino;
  if(p._inicio && !v.inicio) v.inicio = p._inicio;
  if(p._fim && !v.fim) v.fim = p._fim;
  if(p._resumo && !v.resumo) v.resumo = p._resumo;
  if(p._cliente) v.clienteNome = p._cliente;
  if(p._agente) v.agenteNome = p._agente;
  if(p._agenteWa) v.agenteWa = p._agenteWa;

  // FINANCEIRO (do parser)
  if(p._financeiro){
    if(!v.financeiro) v.financeiro={};
    if(p._financeiro.total && parseFloat(p._financeiro.total)>0)
      v.financeiro.total = parseFloat(p._financeiro.total);
    if(p._financeiro.obs) v.financeiro.obs = p._financeiro.obs;
    if(p._financeiro.incluso && p._financeiro.incluso.length)
      v.financeiro.incluso = p._financeiro.incluso;
  }

  // Salvar + mostrar sucesso
  saveStore();
  _importState = {arquivo:null,preview:null,loading:false,erro:"",aplicado:true};
  render();
}

async function salvarCredenciais(){

  }

  if(!store.empresa) store.empresa={};
  if(!store.empresa.master) store.empresa.master={};

  // Sempre atualiza o e-mail
  store.empresa.master.email = email;

  // Só atualiza a senha se foi digitada

    const hashed = await hashSenha(senha);
    store.empresa.master.senha = hashed;

    return;
  }

  saveStore();

  if(okEl){ okEl.style.display="block"; setTimeout(()=>okEl.style.display="none",4000); }
}

let _docFileSelected = null;

// Detectar categoria pelo nome do arquivo
function detectarTipoArquivo(nome){
  const n = nome.toLowerCase();
  if(n.includes("passag") || n.includes("ticket") || n.includes("boarding") || n.includes("voo")) return ["passagem","✈️"];
  if(n.includes("hotel") || n.includes("voucher") || n.includes("reserv")) return ["hotel","🏨"];
  if(n.includes("seguro") || n.includes("insurance") || n.includes("apolic")) return ["seguro","🛡️"];
  if(n.includes("ingresso") || n.includes("tour") || n.includes("passeio") || n.includes("excurs")) return ["passeio","🎭"];
  if(n.includes("transfer") || n.includes("traslado")) return ["transfer","🚗"];
  if(n.includes("cruzeiro") || n.includes("cruise")) return ["cruzeiro","🚢"];
  if(n.includes("trem") || n.includes("train") || n.includes("rail")) return ["trem","🚄"];
  if(n.includes("carro") || n.includes("car") || n.includes("aluguel")) return ["carro","🚙"];
  return ["voucher","🎟️"];
}

// Formatar nome bonito a partir do nome do arquivo
function formatarNomeArquivo(nome){
  // Remover extensão, trocar hífens/underscores por espaço, capitalizar
  const semExt = nome.replace(/[.][^.]+$/, "");
  const comEsp = semExt.replace(/[-_]/g, " ");
  return comEsp.split(" ").map(w=>w?w[0].toUpperCase()+w.slice(1):"").join(" ");
}

async function uploadMultiplo(files){
  const v = getViagem();
  if(!v){ alert("Selecione uma viagem primeiro."); return; }
  if(!files||!files.length) return;

  const lista = document.getElementById("upload-lista");
  if(!lista) return;

  const arr = Array.from(files);
  // Criar cards de progresso para cada arquivo
  lista.innerHTML = arr.map((f,i)=>`
    <div id="upitem-${i}" style="background:var(--surf);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">
      <div style="font-size:20px">${detectarTipoArquivo(f.name)[1]}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${formatarNomeArquivo(f.name)}</div>
        <div style="background:#1B2A50;border-radius:20px;height:4px;margin-top:5px;overflow:hidden">
          <div id="upbar-${i}" style="height:100%;background:linear-gradient(90deg,#C9A84C,#A67C2A);width:0%;transition:width .2s;border-radius:20px"></div>
        </div>
        <div id="uptxt-${i}" style="font-size:10px;color:var(--muted);margin-top:2px">Aguardando...</div>
      </div>
    </div>`).join("");

  // Fazer upload sequencial
  for(let i=0; i<arr.length; i++){
    const file = arr[i];
    const bar = document.getElementById(`upbar-${i}`);
    const txt = document.getElementById(`uptxt-${i}`);

    if(file.size > 10*1024*1024){
      if(txt) txt.textContent = "❌ Muito grande (máx 10MB)";
      if(bar) bar.style.background = "#ef4444";
      continue;
    }

    try{
      if(txt) txt.textContent = "Enviando...";
      const url = await uploadArquivo(file, v.id, pct=>{
        if(bar) bar.style.width = pct+"%";
        if(txt) txt.textContent = `Enviando... ${pct}%`;
      });

      // Salvar no store automaticamente
      const [tipo, icone] = detectarTipoArquivo(file.name);
      const nome = formatarNomeArquivo(file.name);
      if(!v.documentos) v.documentos=[];
      v.documentos.push({id:"D"+Date.now()+i, nome, tipo, icone, link:url, obs:""});
      saveStore();

      if(bar){ bar.style.width="100%"; bar.style.background="#10b981"; }
      if(txt) txt.textContent = "✓ Enviado com sucesso!";

    }catch(e){
      if(bar) bar.style.background="#ef4444";
      if(txt) txt.textContent = "❌ Erro: "+e.message;
    }
  }

  // Recarregar a lista após todos os uploads
  setTimeout(()=>{ render(); }, 1000);
}

async function fazerUploadDoc(){

  const progressWrap = document.getElementById("m-upload-progress");
  const progressBar  = document.getElementById("m-progress-bar");
  const progressTxt  = document.getElementById("m-progress-txt");
  if(progressWrap) progressWrap.style.display="block";
  try{

      if(progressBar) progressBar.style.width = pct+"%";
      if(progressTxt) progressTxt.textContent = "Enviando... "+pct+"%";

    return url;

}

  const tipo = tipos[0];
  const statusEl = document.getElementById("upstatus-"+tipo);
  if(statusEl) statusEl.textContent = "Enviando "+files.length+" arquivo(s)...";

  const arr = Array.from(files);
  let ok = 0;
  for(let i=0; i<arr.length; i++){
    const file = arr[i];
    if(file.size > 10*1024*1024){
      if(statusEl) statusEl.textContent = "❌ "+file.name+" muito grande (máx 10MB)";
      continue;
    }
    try{
      let link = "";
      // Se Firebase Storage disponível, fazer upload
      if(_fbReady && _storage){
        link = await uploadArquivo(file, v.id, ()=>{});
      } else {
        // Sem Firebase: criar URL local temporária (só funciona na sessão)
        link = URL.createObjectURL(file);
      }
      const [tipoDetect, icone] = detectarTipoArquivo(file.name);
      const nomeFormatado = formatarNomeArquivo(file.name);
      if(!v.documentos) v.documentos=[];
      v.documentos.push({
        id:"D"+Date.now()+i,
        nome: nomeFormatado,
        tipo: tipo, // usar o tipo da aba
        icone,
        link,
        obs: file.name
      });
      ok++;
    }catch(e){
      if(statusEl) statusEl.textContent = "❌ Erro: "+e.message;
    }
  }
  if(ok>0){
    saveStore();
    if(statusEl) statusEl.textContent = "✓ "+ok+" arquivo(s) adicionado(s)!";
    setTimeout(()=>render(), 800);
  }
}

// IA — Leitura de PDF e extração automática de dados
// ═══════════════════════════════════════════════════════

// ── Central multi-provider IA function ───────────────────────────────────
// Detects provider from key prefix and calls the right API
async function callIAWithFile(file, prompt, maxTokens=3000){
  const apiKey = (store.apiKey||store.iaKey||"").trim();
  if(!apiKey) throw new Error("Configure a chave de IA em ⚙ Configurações.\n\nAceitamos:\n• Gemini (grátis) — aistudio.google.com\n• Grok (xai-...) — console.x.ai\n• ChatGPT (sk-...) — platform.openai.com");

  // Validate file type — only PDF and images are supported
  const ext = (file.name||"").split(".").pop().toLowerCase();
  const allowed = ["pdf","jpg","jpeg","png","webp"];
  if(!allowed.includes(ext)){
    throw new Error(
      "Formato não suportado: ." + ext + "\n\n" +
      "A IA só consegue ler: PDF, JPG, PNG, WEBP\n\n" +
      "Para arquivos Word (.docx), Excel ou outros formatos:\n" +
      "• Exporte/salve como PDF antes de importar\n" +
      "• No Word: Arquivo → Exportar → PDF\n" +
      "• Ou tire um print/screenshot do documento"
    );
  }

  const base64 = await new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = e => res(e.target.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
  const mime = file.type || "application/pdf";

  // Detect provider
  const provider = apiKey.startsWith("sk-") ? "openai"
                 : apiKey.startsWith("xai-") ? "grok"
                 : "gemini";

  let responseText = "";

  if(provider === "openai"){
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
      body:JSON.stringify({model:"gpt-4o-mini",max_tokens:maxTokens,temperature:0.1,
        messages:[{role:"user",content:[
          {type:"image_url",image_url:{url:"data:"+mime+";base64,"+base64,detail:"high"}},
          {type:"text",text:prompt}
        ]}]})
    });
    const d = await res.json();
    if(d.error) throw new Error("ChatGPT: "+d.error.message);
    responseText = d.choices?.[0]?.message?.content||"{}";

  } else if(provider === "grok"){
    // Grok supports images (jpg/png) but NOT PDF via base64 image_url
    // For PDF: send as text prompt telling grok we have a PDF
    const isImage = ["jpg","jpeg","png","webp"].includes(ext);
    const grokMessages = isImage
      ? [{role:"user",content:[
          {type:"image_url",image_url:{url:"data:"+mime+";base64,"+base64,detail:"high"}},
          {type:"text",text:prompt}
        ]}]
      : [{role:"user",content: prompt + "\n\n[Nota: O usuário enviou um arquivo PDF mas não foi possível processar visualmente. Por favor retorne um JSON vazio {} e oriente o usuário a converter o PDF em imagem PNG ou JPG para usar com o Grok, ou use a chave Gemini que suporta PDF nativamente.]"}];

    const res = await fetch("https://api.x.ai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
      body:JSON.stringify({model:"grok-4-1-fast-non-reasoning",max_tokens:maxTokens,temperature:0.1,
        messages: grokMessages})
    });
    const d = await res.json();
    if(d.error) throw new Error("Grok: "+(d.error.message||JSON.stringify(d.error)));
    // If PDF was sent without image, show helpful error
    if(!isImage){
      throw new Error(
        "Grok não suporta PDF diretamente.\n\n" +
        "Opções:\n" +
        "• Use uma chave Gemini (grátis) — suporta PDF nativo\n" +
        "• Use uma chave ChatGPT (sk-...) — suporta PDF\n" +
        "• Converta o PDF em imagem PNG/JPG e tente novamente"
      );
    }
    responseText = d.choices?.[0]?.message?.content||"{}";

  } else {
    // Gemini — fallback through models
    const MODELS = ["gemini-2.0-flash","gemini-2.0-flash-lite","gemini-2.5-flash","gemini-1.5-flash","gemini-1.5-pro"];
    let lastErr = "";
    let ok = false;
    for(const model of MODELS){
      try{
        const res = await fetch(
          "https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+apiKey,
          {method:"POST",headers:{"Content-Type":"application/json"},
           body:JSON.stringify({contents:[{role:"user",parts:[
             {inline_data:{mime_type:mime,data:base64}},{text:prompt}
           ]}],generationConfig:{maxOutputTokens:maxTokens,temperature:0.1}})}
        );
        const d = await res.json();
        if(d.error){
          lastErr = d.error.message||JSON.stringify(d.error);
          const overload = lastErr.includes("high demand")||lastErr.includes("overload")||
                           lastErr.includes("quota")||lastErr.includes("RESOURCE_EXHAUSTED")||
                           lastErr.includes("SERVICE_UNAVAILABLE");
          if(overload) continue;
          throw new Error(lastErr);
        }
        responseText = d.candidates?.[0]?.content?.parts?.[0]?.text||"{}";
        ok = true; break;
      }catch(e){
        lastErr = e.message;
        if(e.message.includes("high demand")||e.message.includes("overload")||e.message.includes("quota")) continue;
        throw e;
      }
    }
    if(!ok) throw new Error("Gemini indisponível: "+lastErr+"\n\nDica: Cole uma chave Grok (xai-...) ou ChatGPT (sk-...) em ⚙ Configurações.");
  }

  const clean = responseText.replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
  try{ return JSON.parse(clean); }
  catch(e){ throw new Error("IA retornou formato inválido. Tente novamente."); }
}

async function processarArquivoIA(file, viagemId){
  const v = store.viagens.find(x=>x.id===viagemId);
  if(!v) return;

  // 1. Fazer upload do arquivo
  let link = "";
  try{
    link = await uploadArquivo(file, viagemId, ()=>{});
  }catch(e){
    console.warn("Upload falhou, usando blob:", e.message);
    try{ link = URL.createObjectURL(file); }catch(e2){ link = ""; }
  }

  // 2. Ler com IA
  const dados = await lerPDFcomIA(file);

  // 3. Adicionar documento na lista
  if(!v.documentos) v.documentos=[];
  v.documentos.push({
    id: "D"+Date.now(),
    nome: dados.nome || formatarNomeArquivo(file.name),
    tipo: dados.tipo || detectarTipoArquivo(file.name)[0],
    icone: dados.icone || detectarTipoArquivo(file.name)[1],
    link: link,
    obs: dados.obs || ""
  });

  // 4. Preencher dados automaticamente na aba certa
  if(dados.voo && dados.voo.trecho){
    if(!v.voos) v.voos=[];
    v.voos.push({
      id:"F"+Date.now(),
      trecho: dados.voo.trecho||"",
      cia: dados.voo.cia||"",
      numero: dados.voo.numero||"",
      saida: dados.voo.saida||"",
      chegada: dados.voo.chegada||"",
      terminal: dados.voo.terminal||"",
      localizador: dados.voo.localizador||"",
      bagagem: dados.voo.bagagem||"",
      checkIn: link||"#",
      nota: dados.voo.nota||"",
      status:"confirmado"
    });
  }
  // Adicionar voo no roteiro automaticamente
  if(dados.voo && dados.voo.trecho){
    if(!v.roteiro) v.roteiro=[];
    const saidaParts = (dados.voo.saida||"").split("·");
    const saidaHora = saidaParts[1]?.trim()||"00:00";
    v.roteiro.push({
      dia: v.inicio||"",
      horario: saidaHora,
      titulo: "✈️ Voo "+dados.voo.trecho,
      desc: (dados.voo.cia||"")+" · "+dados.voo.numero+" · Localizador: "+(dados.voo.localizador||"")+(dados.voo.terminal?" · "+dados.voo.terminal:""),
      tipo: "voo",
      local: dados.voo.terminal||""
    });
  }

  if(dados.hotel && dados.hotel.nome){
    if(!v.hoteis) v.hoteis=[];
    v.hoteis.push({
      id:"H"+Date.now(),
      nome: dados.hotel.nome||"",
      estrelas: dados.hotel.estrelas||4,
      cidade: dados.hotel.cidade||"",
      endereco: dados.hotel.endereco||"",
      checkin: dados.hotel.checkin||"",
      checkout: dados.hotel.checkout||"",
      confirmacao: dados.hotel.confirmacao||"",
      telefone: dados.hotel.telefone||"",
      mapa: dados.hotel.endereco
        ? "https://maps.google.com/?q="+encodeURIComponent((dados.hotel.nome||"")+" "+dados.hotel.endereco)
        : dados.hotel.nome
          ? "https://maps.google.com/?q="+encodeURIComponent(dados.hotel.nome+(dados.hotel.cidade?" "+dados.hotel.cidade:""))
          : "#",
      nota: dados.hotel.nota||""
    });
  }
  // Adicionar check-in do hotel no roteiro automaticamente
  if(dados.hotel && dados.hotel.nome && dados.hotel.checkin){
    if(!v.roteiro) v.roteiro=[];
    // Extrair data do checkin (formato "10/Jun · 15:00")
    const checkinParts = dados.hotel.checkin.split("·");
    const checkinHora = checkinParts[1]?.trim()||"15:00";
    v.roteiro.push({
      dia: v.inicio||"",
      horario: checkinHora,
      titulo: "Check-in — "+dados.hotel.nome,
      desc: "Check-in confirmado. Confirmação: "+(dados.hotel.confirmacao||""),
      tipo: "hotel",
      local: dados.hotel.endereco||dados.hotel.nome+(dados.hotel.cidade?", "+dados.hotel.cidade:"")
    });
  }

  if(dados.transfer && dados.transfer.servico){
    if(!v.transfers) v.transfers=[];
    v.transfers.push({
      id:"T"+Date.now(),
      servico: dados.transfer.servico||"",
      data: dados.transfer.data||"",
      horario: dados.transfer.horario||"",
      tipo: dados.transfer.tipo||"Transfer",
      fornecedor: dados.transfer.fornecedor||"",
      motorista: dados.transfer.motorista||"",
      contato: dados.transfer.contato||"",
      obs:""
    });
  }
  // Adicionar transfer no roteiro automaticamente
  if(dados.transfer && dados.transfer.servico){
    if(!v.roteiro) v.roteiro=[];
    v.roteiro.push({
      dia: v.inicio||"",
      horario: dados.transfer.horario||"00:00",
      titulo: "🚗 "+dados.transfer.servico,
      desc: (dados.transfer.fornecedor||"")+(dados.transfer.motorista?" · Motorista: "+dados.transfer.motorista:"")+(dados.transfer.contato?" · "+dados.transfer.contato:""),
      tipo: "transfer",
      local: dados.transfer.servico||""
    });
  }

  if(dados.roteiro && dados.roteiro.length>0){
    if(!v.roteiro) v.roteiro=[];
    dados.roteiro.forEach(r=>{
      v.roteiro.push({
        dia: r.dia||"",
        horario: r.horario||"",
        titulo: r.titulo||"",
        desc: r.desc||"",
        tipo: r.tipo||"passeio",
        local: r.local||""
      });
    });
    v.roteiro.sort((a,b)=>a.dia.localeCompare(b.dia)||a.horario.localeCompare(b.horario));
  }

  // Seguro viagem
  if(dados.seguro && dados.seguro.seguradora){
    if(!v.documentos) v.documentos=[];
    // Já adicionado como doc acima, mas adicionar contato do seguro
    if(dados.seguro.telefone24h){
      if(!v.contatos) v.contatos=[];
      v.contatos.push({
        nome: dados.seguro.seguradora||"Seguradora",
        cargo: "Central de sinistros 24h · "+( dados.seguro.apolice||""),
        tel: dados.seguro.telefone24h,
        wa: null,
        tipo: "seguro",
        icone: "🛡️"
      });
    }
  }

  // Ingresso / Ticket
  if(dados.ingresso && dados.ingresso.evento){
    // Já salvo como doc, adicionar no roteiro automaticamente
    if(dados.ingresso.data && !v.roteiro){
      v.roteiro = [];
    }
    if(dados.ingresso.data){
      // Tentar converter data para ISO
      v.roteiro = v.roteiro||[];
      v.roteiro.push({
        dia: v.inicio||"",
        horario: dados.ingresso.data.includes("·")?dados.ingresso.data.split("·")[1]?.trim()||"09:00":"09:00",
        titulo: dados.ingresso.evento,
        desc: dados.ingresso.nota||("Ingresso para "+dados.ingresso.evento),
        tipo: "passeio",
        local: dados.ingresso.local||""
      });
      v.roteiro.sort((a,b)=>a.dia.localeCompare(b.dia)||a.horario.localeCompare(b.horario));
    }
  }

  // Contatos extraídos do documento
  if(dados.contatos && dados.contatos.length>0){
    if(!v.contatos) v.contatos=[];
    dados.contatos.forEach(c=>{
      // Evitar duplicatas por telefone
      const jaExiste = v.contatos.find(x=>x.tel===c.tel);
      if(!jaExiste && c.nome && c.tel){
        v.contatos.push({
          nome: c.nome||"",
          cargo: c.cargo||"",
          tel: c.tel||"",
          wa: c.wa||null,
          tipo: c.tipo||"outro",
          icone: c.icone||"📞"
        });
      }
    });
  }

  // Ordenar roteiro final
  if(v.roteiro && v.roteiro.length>0){
    v.roteiro.sort((a,b)=>a.dia.localeCompare(b.dia)||a.horario.localeCompare(b.horario));
  }

  saveStore();
  return dados;
}

// Upload inteligente com IA — chamado pela área de upload do admin
async function uploadInteligenteIA(files){
  const v = getViagem();
  if(!v){ alert("Selecione uma viagem primeiro."); return; }

  const lista = document.getElementById("upload-lista");
  const apiKey = (store.apiKey||"").trim();
  const arr = Array.from(files);

  // Criar cards de progresso
  if(lista) lista.innerHTML = arr.map((f,i)=>`
    <div id="upitem-ia-${i}" style="background:var(--surf);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">
      <div style="font-size:20px">${detectarTipoArquivo(f.name)[1]}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${formatarNomeArquivo(f.name)}</div>
        <div style="background:#1B2A50;border-radius:20px;height:4px;margin-top:5px;overflow:hidden">
          <div id="upbar-ia-${i}" style="height:100%;background:linear-gradient(90deg,#C9A84C,#A67C2A);width:0%;transition:width .3s;border-radius:20px"></div>
        </div>
        <div id="uptxt-ia-${i}" style="font-size:10px;color:var(--muted);margin-top:2px">Aguardando...</div>
      </div>
    </div>`).join("");

  for(let i=0; i<arr.length; i++){
    const file = arr[i];
    const bar = document.getElementById(`upbar-ia-${i}`);
    const txt = document.getElementById(`uptxt-ia-${i}`);

    if(file.size > 10*1024*1024){
      if(txt) txt.textContent = "❌ Muito grande (máx 10MB)";
      continue;
    }

    try{
      if(bar) bar.style.width="30%";
      if(txt) txt.textContent = apiKey ? "✦ IA lendo o documento..." : "Salvando arquivo...";

      if(apiKey){
        const dados = await processarArquivoIA(file, v.id);
        if(bar){ bar.style.width="100%"; bar.style.background="#10b981"; }
        // Mostrar o que foi extraído
        const extraido = [];
        if(dados.voo?.trecho) extraido.push("✈️ "+dados.voo.trecho);
        if(dados.hotel?.nome) extraido.push("🏨 "+dados.hotel.nome);
        if(dados.transfer?.servico) extraido.push("🚗 Transfer");
        if(dados.seguro?.seguradora) extraido.push("🛡️ "+dados.seguro.seguradora);
        if(dados.ingresso?.evento) extraido.push("🎫 "+dados.ingresso.evento);
        if(dados.contatos?.length) extraido.push("📞 "+dados.contatos.length+" contato(s)");
        if(dados.roteiro?.length) extraido.push("📅 "+dados.roteiro.length+" atividade(s)");
        if(txt) txt.textContent = extraido.length>0
          ? "✓ Extraído: "+extraido.join(" · ")
          : "✓ Salvo como documento";
      } else {
        // Sem IA — só salvar o arquivo
        await uploadMultiplo([file]);
        if(bar){ bar.style.width="100%"; bar.style.background="#10b981"; }
        if(txt) txt.textContent = "✓ Salvo (configure a chave Gemini para extração automática)";
      }
    }catch(e){
      if(bar) bar.style.background="#ef4444";
      if(txt) txt.textContent = "❌ "+e.message.substring(0,60);
    }
  }

  setTimeout(()=>render(), 1000);
}

// ── IA TRAVEL ──
async function enviarIATravel(){
  const input=document.getElementById("ia-travel-input");
  const txt=input?.value?.trim();
  if(!txt||iaLoading) return;
  input.value="";
  iaMsgs.push({role:"user",text:txt});
  iaLoading=true;
  atualizarChatIA();

  try{
    const apiKey=(store.apiKey||"").trim();
    if(!apiKey){
      iaMsgs.push({role:"assistant",text:"⚠️ A IA não está configurada ainda. O administrador precisa adicionar a chave de API em ⚙ Configurações."});
      iaLoading=false; atualizarChatIA(); return;
    }
    const v=getViagem();
    const basePrompt=(store.iaPrompt||"").trim();
    const ctx=v?` Viagem atual do cliente: "${v.titulo}" — ${v.destino}, ${v.inicio} a ${v.fim}.`:"";
    const sys=basePrompt+ctx;
    const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
    const history=iaMsgs.slice(0,-1).map(m=>({role:m.role==="user"?"user":"model",parts:[{text:m.text}]}));
    history.push({role:"user",parts:[{text:txt}]});
    const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({systemInstruction:{parts:[{text:sys}]},contents:history,generationConfig:{maxOutputTokens:600,temperature:0.7}})});
    const d=await res.json();
    if(d.error) iaMsgs.push({role:"assistant",text:"Erro: "+d.error.message});
    else {
      // Strip any HTML tags from IA response before storing
      const rawText = d.candidates?.[0]?.content?.parts?.[0]?.text||"Sem resposta.";
      const cleanText = rawText.replace(/<[^>]*>/g,"").trim()||"Sem resposta.";
      iaMsgs.push({role:"assistant", text: cleanText});
    }
  }catch(e){
    iaMsgs.push({role:"assistant",text:"Erro de conexão: "+e.message});
  }
  iaLoading=false;
  atualizarChatIA();
}

function atualizarChatIA(){
  const el=document.getElementById("ia-travel-msgs");
  if(!el) return;
  const loadingBubble=iaLoading?`<div style="display:flex;justify-content:flex-start"><div style="padding:8px 12px;border-radius:12px 12px 12px 3px;background:#1B2A50;color:#4E6285;font-size:13px">✦ Digitando...</div></div>`:"";
  el.innerHTML=iaMsgs.map(m=>`
    <div style="display:flex;justify-content:${m.role==="user"?"flex-end":"flex-start"};margin-bottom:6px">
      <div style="max-width:85%;padding:9px 13px;border-radius:${m.role==="user"?"14px 14px 3px 14px":"14px 14px 14px 3px"};
        background:${m.role==="user"?"linear-gradient(135deg,#C9A84C,#A67C2A)":"#1B2A50"};
        color:${m.role==="user"?"#060C1E":"#E8EDF8"};font-size:13px;line-height:1.5;white-space:pre-wrap">
        ${m.text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
      </div>
    </div>`).join("")+loadingBubble;
  el.scrollTop=el.scrollHeight;
}

function gerarPDF(){
  const v = getViagem();
  if(!v){ alert("Nenhuma viagem encontrada."); return; }

  // Overlay de loading
  const overlay = document.createElement("div");
  overlay.id = "pdf-overlay";
  overlay.innerHTML = `<div class="pdf-spinner"></div><p>Preparando documento...</p>`;
  document.body.appendChild(overlay);

  setTimeout(() => {
    try {
      const doc = buildPDFDoc(v);
      const win = window.open("", "_blank", "width=900,height=700,scrollbars=yes");
      if(!win){ alert("Permita pop-ups para gerar o PDF."); overlay.remove(); return; }
      win.document.write(doc);
      win.document.close();
      setTimeout(() => {
        try { win.focus(); win.print(); } catch(e){}
        overlay.remove();
      }, 800);
    } catch(e) {
      overlay.remove();
      alert("Erro ao gerar PDF: " + e.message);
    }
  }, 300);
}

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:#fff;color:#1a1a2e;font-size:13px;line-height:1.6;}
  .page{max-width:920px;margin:0 auto;}
  @media print{
    @page{size:A4 portrait;margin:0;}
    body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .no-print{display:none!important;}
    .page-break{page-break-before:always;}
  }
</style>
</head>
<body>
<div class="page">

<!-- ══ CAPA ══ -->
<div style="background:#0a1628;min-height:360px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:44px 52px;">
  <svg style="position:absolute;bottom:0;left:0;right:0;height:50%;opacity:0.1;" viewBox="0 0 920 200" preserveAspectRatio="none">
    <polygon points="0,200 100,55 220,110 360,18 480,95 600,28 720,75 920,38 920,200" fill="white"/>
  </svg>
  <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(10,22,40,0.85) 0%,transparent 65%);"></div>
  <!-- Logo -->
  <div style="position:absolute;top:36px;left:52px;">
    <img src="${logo}" alt="${esc(empresa.nome||"VETUR")}" style="height:52px;width:auto;"/>
  </div>
  <!-- Para -->
  <div style="position:absolute;top:40px;right:52px;text-align:right;">
    <div style="font-size:9px;color:#6a7fa0;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;">Proposta para</div>
    <div style="font-size:15px;font-weight:600;color:#e8edf8;">${esc((v.contatos&&v.contatos[0]?.nome)||session?.nome||"Cliente")}</div>
    <div style="font-size:10px;color:#c9a84c;margin-top:2px;">${new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"})}</div>
  </div>
  <!-- Conteúdo principal -->
  <div style="position:relative;z-index:2;">
    <div style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#c9a84c;margin-bottom:12px;">ROTEIRO DE VIAGEM · ${esc(empresa.nome||"VETUR")}</div>
    <div style="font-family:'Playfair Display',Georgia,serif;font-size:42px;font-weight:700;color:#fff;line-height:1.1;margin-bottom:12px;">${esc(v.titulo)}</div>
    <div style="width:52px;height:2px;background:#c9a84c;margin-bottom:16px;"></div>
    <div style="font-size:13px;color:#aabfda;">${v.pais||""} ${esc(v.destino||"")}</div>
    <div style="font-size:12px;color:#c9a84c;font-weight:500;margin-top:4px;letter-spacing:.5px;">${inicio} — ${fim}${duracao?" · "+duracao+" dias":""}</div>
  </div>
  <div style="position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#c9a84c,#e8c98a,#c9a84c);"></div>
</div>

<!-- ══ RESUMO ══ -->
<div style="padding:32px 52px;border-bottom:1px solid #f0ebe3;">
  ${chips.length?`<div style="display:grid;grid-template-columns:repeat(${gridCols},1fr);gap:10px;margin-bottom:${v.resumo?'20px':'0'};">${chips.join("")}</div>`:""}
  ${v.resumo?`<div style="background:#0a1628;border-radius:10px;padding:14px 18px;border-left:4px solid #c9a84c;">
    <div style="font-size:10px;font-weight:700;color:#c9a84c;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;">Sobre a viagem</div>
    <div style="font-size:13px;color:#aabfda;line-height:1.7;">${esc(v.resumo)}</div>
  </div>`:""}
</div>

<!-- ══ SEÇÕES DINÂMICAS ══ -->
${voosHTML}
${hoteisHTML}
${transfersHTML}
${carrosHTML}
${passeiosHTML}
${segurosHTML}
${temRoteiro?'<div class="page-break"></div>':""}
${roteiroHTML}
${finHTML}
${contatosHTML}

<!-- ══ FORMAS DE PAGAMENTO ══ -->
<div style="padding:28px 52px;border-top:2px solid #c9a84c20;background:#f8f6f2;page-break-inside:avoid;margin-bottom:0;">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
    <div style="width:4px;height:28px;background:#c9a84c;border-radius:2px;flex-shrink:0;"></div>
    <div style="font-family:'Playfair Display',Georgia,serif;font-size:16px;font-weight:700;color:#0a1628;">Formas de Pagamento</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px;">
    <div style="display:flex;gap:12px;align-items:flex-start;">
      <span style="font-size:16px;flex-shrink:0;">✈️</span>
      <div>
        <div style="font-size:11px;font-weight:700;color:#0a1628;margin-bottom:2px;">Passagens aéreas</div>
        <div style="font-size:11px;color:#5a5a6a;line-height:1.6;">Parcelamento conforme política da companhia aérea, podendo chegar a até 4x sem juros (sujeito à operadora do cartão e disponibilidade no momento da emissão).</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start;">
      <span style="font-size:16px;flex-shrink:0;">🏨</span>
      <div>
        <div style="font-size:11px;font-weight:700;color:#0a1628;margin-bottom:2px;">Hospedagens e serviços terrestres</div>
        <div style="font-size:11px;color:#5a5a6a;line-height:1.6;">Parcelamento via operadora/consolidado, em até <strong style="color:#0a1628;">${esc(empresa.parcelasHotel||"[X parcelas]")}</strong>, com ou sem juros, conforme fornecedor.</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start;">
      <span style="font-size:16px;flex-shrink:0;">🎫</span>
      <div>
        <div style="font-size:11px;font-weight:700;color:#0a1628;margin-bottom:2px;">Passeios e serviços adicionais</div>
        <div style="font-size:11px;color:#5a5a6a;line-height:1.6;">Condições variáveis, podendo exigir pagamento à vista ou seguir parcelamento dos serviços terrestres.</div>
      </div>
    </div>
    <div style="font-size:10px;color:#8a8a9a;line-height:1.6;padding-top:6px;border-top:1px solid #e0ddd6;">As condições de pagamento podem variar conforme cada fornecedor e estão sujeitas à confirmação no momento da reserva.</div>
  </div>
</div>

<!-- ══ TERMOS E CONDIÇÕES ══ -->
<div style="padding:28px 52px;border-top:1px solid #e0ddd6;background:#f8f6f2;page-break-inside:avoid;">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
    <div style="width:4px;height:28px;background:#c9a84c;border-radius:2px;flex-shrink:0;"></div>
    <div style="font-family:'Playfair Display',Georgia,serif;font-size:16px;font-weight:700;color:#0a1628;">Termos e Condições</div>
  </div>
  <ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:7px;">
    <li style="font-size:11px;color:#5a5a6a;line-height:1.6;padding-left:14px;position:relative;">
      <span style="position:absolute;left:0;color:#c9a84c;font-weight:700;">•</span>
      Valores sujeitos a alteração sem aviso prévio, conforme disponibilidade e atualização de tarifas por parte das companhias aéreas, hotéis e fornecedores.
    </li>
    <li style="font-size:11px;color:#5a5a6a;line-height:1.6;padding-left:14px;position:relative;">
      <span style="position:absolute;left:0;color:#c9a84c;font-weight:700;">•</span>
      Este orçamento é válido por <strong style="color:#0a1628;">${esc(empresa.prazoOrcamento||"48 horas")}</strong> a partir da data de envio.
    </li>
    <li style="font-size:11px;color:#5a5a6a;line-height:1.6;padding-left:14px;position:relative;">
      <span style="position:absolute;left:0;color:#c9a84c;font-weight:700;">•</span>
      Os valores somente serão garantidos após a confirmação e pagamento/emissão dos serviços.
    </li>
    <li style="font-size:11px;color:#5a5a6a;line-height:1.6;padding-left:14px;position:relative;">
      <span style="position:absolute;left:0;color:#c9a84c;font-weight:700;">•</span>
      Em casos de emissão com milhas, a disponibilidade e a pontuação podem variar a qualquer momento.
    </li>
    <li style="font-size:11px;color:#5a5a6a;line-height:1.6;padding-left:14px;position:relative;">
      <span style="position:absolute;left:0;color:#c9a84c;font-weight:700;">•</span>
      Valores baseados no câmbio do dia (<strong style="color:#0a1628;">${new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"})}</strong>), podendo sofrer alterações até a confirmação.
    </li>
  </ul>
</div>

<!-- ══ RODAPÉ ══ -->
<div style="background:#0a1628;padding:22px 52px;display:flex;align-items:center;justify-content:space-between;gap:20px;">
  <div style="display:flex;align-items:center;gap:14px;">
    <img src="${logo}" alt="${esc(empresa.nome||"VETUR")}" style="height:38px;width:auto;"/>
    <div>
      <div style="font-size:10px;color:#6a7fa0;margin-bottom:2px;">${esc(empresa.slogan||"")}</div>
      <div style="font-size:10px;color:#6a7fa0;">${[empresa.email,empresa.telefone,empresa.instagram].filter(Boolean).join(" · ")}</div>
    </div>
  </div>
  <div style="text-align:right;font-size:10px;color:#3a4f70;">
    <div style="color:#c9a84c;font-weight:600;">${esc(v.titulo)}</div>
    <div>Documento gerado em ${new Date().toLocaleDateString("pt-BR")}</div>
  </div>
</div>

<!-- Botões flutuantes -->
<div class="no-print" style="position:fixed;bottom:20px;right:20px;display:flex;gap:10px;z-index:999;flex-wrap:wrap;justify-content:flex-end;">
  <button onclick="window.print()" style="background:linear-gradient(135deg,#c9a84c,#a67c2a);color:#060c1e;border:none;padding:12px 22px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(201,168,76,.45);">🖨️ Imprimir / PDF</button>
  <button onclick="enviarWhatsApp_${v.clienteWa||v.agenteWa||''}_${encodeURIComponent(v.titulo||'Proposta')}" id="btn-wa" style="background:#25d366;color:#fff;border:none;padding:12px 22px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(37,211,102,.4);" onclick="(function(){ const wa='${v.clienteWa||''}'; const titulo='${(v.titulo||'Proposta de viagem').replace(/'/g,'').substring(0,40)}'; const agente='${(v.agenteNome||'').replace(/'/g,'')}'; const msg=encodeURIComponent('Olá! Segue a proposta de viagem *'+titulo+'*. Em caso de dúvidas estou à disposição!\n\n'+agente); const url=wa?'https://wa.me/'+wa.replace(/\D/g,'')+'?text='+msg:'https://wa.me/?text='+msg; window.open(url,'_blank'); })()">📱 WhatsApp</button>
  <button onclick="window.close()" style="background:#0a1628;color:#e8edf8;border:1px solid #1b2a50;padding:12px 18px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;">✕ Fechar</button>
</div>

</div>
</body>
</html>`;
}

</script>
</body>
</html>
